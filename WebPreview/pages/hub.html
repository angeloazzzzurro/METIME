<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>METIME — La Mia Casa</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/game.css"/>
  <style>
    /* ── House Room ───────────────────── */
    .house-wrap{perspective:600px;margin:0 auto;max-width:340px}
    .house-room{
      position:relative;width:100%;aspect-ratio:5/4.5;
      border-radius:var(--radius-lg);border:3px solid var(--border);
      overflow:hidden;box-shadow:var(--shadow),var(--inner-glow);
    }
    .house-wall{
      position:absolute;top:0;left:0;right:0;height:34%;
      background:linear-gradient(180deg,#e8ddd0,#f5efe6 80%,#d8cbb5);
      border-bottom:4px solid var(--border);z-index:0;
      box-shadow:inset 0 -16px 30px rgba(61,43,31,.05);
    }
    .wall-trim{
      position:absolute;bottom:0;left:0;right:0;height:35%;
      background:repeating-linear-gradient(90deg,transparent,transparent 32px,rgba(139,99,64,.07) 32px,rgba(139,99,64,.07) 33px);
    }
    .house-floor{
      position:absolute;bottom:0;left:0;right:0;height:66%;
      background:repeating-conic-gradient(#e4d4b8 0% 25%,#dccca8 0% 50%) 0 0/42px 42px;
      z-index:0;
    }
    /* Wall slots */
    .wall-slots{
      position:absolute;top:3%;left:0;right:0;height:28%;
      display:flex;justify-content:center;gap:14px;align-items:center;
      z-index:2;pointer-events:none;
    }
    .wall-slot{
      width:44px;height:44px;border-radius:var(--radius-sm);
      display:grid;place-items:center;font-size:28px;
      filter:drop-shadow(0 2px 4px rgba(61,43,31,.25));
      transition:transform .2s var(--spring);
      cursor:pointer;pointer-events:auto;
      -webkit-tap-highlight-color:transparent;
      touch-action:none;
    }
    .wall-slot:hover{transform:scale(1.15) rotate(-3deg)}
    .wall-slot.sel{outline:2px solid var(--orange);outline-offset:2px}
    .wall-slot.drop-hover{outline:2px solid var(--sage);outline-offset:2px;background:rgba(143,168,130,.12)}
    .wall-slot.empty{
      border:2px dashed rgba(139,99,64,.2);font-size:16px;color:var(--border-lt);
      background:rgba(255,255,255,.3);display:none;
    }
    .house-room.edit-mode .wall-slot.empty{display:grid}
    .house-room.edit-mode .wall-slot:not(.empty){animation:wiggle .6s infinite}
    /* Floor grid */
    .floor-grid{
      position:absolute;bottom:0;left:0;right:0;height:66%;
      display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(4,1fr);
      z-index:1;pointer-events:none;
    }
    .house-room.edit-mode .floor-grid{pointer-events:auto}
    .floor-cell{
      border:1px dashed transparent;display:grid;place-items:center;
      cursor:pointer;transition:background .12s,border-color .12s;
      position:relative;
    }
    .house-room.edit-mode .floor-cell{border-color:rgba(139,99,64,.18)}
    .house-room.edit-mode .floor-cell:hover{background:rgba(212,136,74,.12)}
    .house-room.edit-mode .floor-cell.highlight{background:rgba(143,168,130,.2);border-color:var(--sage)}
    .house-room.edit-mode .floor-cell.sel{background:rgba(212,136,74,.16);border-color:var(--orange)}
    .house-room.edit-mode .floor-cell.drop-hover{background:rgba(143,168,130,.24);border-color:var(--sage)}
    .placed{
      font-size:28px;cursor:pointer;
      filter:drop-shadow(0 2px 3px rgba(61,43,31,.2));
      transition:transform .2s var(--spring);
      -webkit-tap-highlight-color:transparent;
      touch-action:none;
    }
    .placed:hover{transform:scale(1.15)}
    .placed.sel{transform:scale(1.18);filter:drop-shadow(0 0 8px rgba(212,136,74,.35))}
    .house-room.edit-mode .placed{animation:wiggle .6s infinite}
    .house-room.edit-mode .placed:hover{animation:none;transform:scale(1.2)}
    .room-bed{
      position:absolute; right:28px; bottom:34px; width:132px; height:86px;
      z-index:3; pointer-events:auto; cursor:pointer;
      transition:transform .2s var(--spring), filter .2s;
    }
    .room-bed:hover{transform:translateY(-3px);filter:brightness(1.04)}
    .room-bed.resting{animation:bedGlow 1.4s ease-in-out infinite alternate}
    .room-bed.dragging{opacity:.9;filter:drop-shadow(0 8px 14px rgba(61,43,31,.24))}
    @keyframes bedGlow{
      0%{filter:drop-shadow(0 0 0 rgba(139,99,64,0))}
      100%{filter:drop-shadow(0 0 10px rgba(139,99,64,.35))}
    }
    .room-bed-shadow{
      position:absolute; left:14px; right:14px; bottom:-8px; height:15px;
      background:radial-gradient(ellipse, rgba(61,43,31,.22) 0%, rgba(61,43,31,.08) 50%, transparent 76%);
      border-radius:50%;
    }
    .room-bed-frame{
      position:absolute; inset:22px 8px 14px;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 2px, transparent 2px 12px),
        linear-gradient(180deg,#b88454,#9b673d,#7a4d2b);
      border:2px solid #714927; border-radius:14px;
      box-shadow:inset 0 1px 0 rgba(255,235,210,.28),0 2px 4px rgba(61,43,31,.16);
    }
    .room-bed-side{
      position:absolute; left:8px; right:8px; bottom:10px; height:14px;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,.05) 0 3px, transparent 3px 10px),
        linear-gradient(180deg,#946039,#714927 72%,#59371f);
      border:2px solid #5d381e;
      border-top:0;
      border-radius:0 0 12px 12px;
    }
    .room-bed-head,
    .room-bed-foot{
      position:absolute; left:16px; right:16px;
      background:
        radial-gradient(circle at 20% 50%, rgba(255,220,185,.18) 0 8%, transparent 9%),
        radial-gradient(circle at 78% 55%, rgba(80,45,24,.16) 0 9%, transparent 10%),
        linear-gradient(180deg,#8f5c36,#6e4527,#54331c);
      border:2px solid #6a4123;
      box-shadow:inset 0 2px 0 rgba(255,226,194,.28),0 3px 6px rgba(61,43,31,.2);
    }
    .room-bed-head{
      top:10px; height:24px; border-radius:16px 16px 8px 8px;
    }
    .room-bed-foot{
      bottom:12px; height:12px; border-radius:0 0 10px 10px;
    }
    .room-bed-mattress{
      position:absolute; left:14px; right:14px; top:24px; bottom:20px;
      background:linear-gradient(180deg,#f8f1e7,#eee2d2,#dfccb5);
      border:1px solid #c6af92; border-radius:12px;
      box-shadow:inset 0 -4px 10px rgba(160,130,90,.14), inset 0 2px 0 rgba(255,255,255,.6);
    }
    .room-bed-front{
      position:absolute; left:18px; right:18px; bottom:16px; height:12px;
      background:linear-gradient(180deg,#e5d5bc,#d4bc99 80%,#bea07b);
      border:1px solid #b69671; border-top:0;
      border-radius:0 0 10px 10px;
    }
    .room-bed-blanket{
      position:absolute; left:16px; right:16px; top:42px; bottom:16px;
      background:
        radial-gradient(circle at 32% 28%, rgba(255,224,183,.24) 0%, transparent 34%),
        radial-gradient(circle at 70% 30%, rgba(125,74,39,.18) 0%, transparent 42%),
        linear-gradient(180deg, #c7935f 0%, #a46d42 42%, #84512f 100%);
      border:1.5px solid #6b4224; border-radius:16px 16px 12px 12px;
      box-shadow:inset 0 2px 0 rgba(255,255,255,.14), inset 0 -6px 14px rgba(0,0,0,.14);
      overflow:visible;
    }
    .room-bed-blanket::before{
      content:"";
      position:absolute; left:6px; right:6px; bottom:-9px; height:14px;
      background:
        linear-gradient(180deg, rgba(255,232,198,.22), transparent 35%),
        linear-gradient(180deg, #b27a49 0%, #8f5b35 100%);
      border:1.5px solid #6b4224; border-top:0;
      border-radius:0 0 12px 12px;
      box-shadow:0 4px 8px rgba(61,43,31,.12);
    }
    .room-bed-blanket::after{
      content:"";
      position:absolute; left:8px; right:8px; top:6px; bottom:8px;
      border:1px solid rgba(88,54,30,.18);
      border-radius:12px;
    }
    .room-bed-pillows{
      position:absolute; left:22px; right:22px; top:28px;
      display:flex; justify-content:space-between; gap:10px;
    }
    .room-bed-pillows span{
      width:32px; height:14px; border-radius:999px;
      box-shadow:0 2px 4px rgba(61,43,31,.1), inset 0 1px 0 rgba(255,255,255,.45);
    }
    .room-bed-pillows span:first-child{
      background:linear-gradient(180deg,#efe4d4,#dbc8b2,#c9ae90);
      border:1px solid #b79674;
    }
    .room-bed-pillows span:last-child{
      background:linear-gradient(180deg,#e7d9cb,#d0baa6,#b99779);
      border:1px solid #a47f60;
    }
    .room-bed-zzz{
      position:absolute; top:-18px; right:8px; font-weight:900; color:#8b5d36;
      opacity:0; text-shadow:0 1px 1px rgba(61,43,31,.28);
    }
    .room-bed.resting .room-bed-zzz{opacity:1; animation:zzzBob 2.2s ease-in-out infinite}
    @keyframes zzzBob{
      0%,100%{transform:translateY(0);opacity:.7}
      50%{transform:translateY(-8px);opacity:1}
    }
    /* Edit toggle */
    .edit-btn{
      position:absolute;top:8px;right:8px;z-index:10;
      width:36px;height:36px;border-radius:50%;
      border:2.5px solid var(--border-lt);background:var(--panel);
      display:grid;place-items:center;font-size:16px;cursor:pointer;
      box-shadow:var(--shadow-sm);transition:transform .15s var(--spring),background .15s;
      -webkit-tap-highlight-color:transparent;
    }
    .edit-btn:hover{transform:scale(1.1)}
    .edit-btn.on{background:var(--orange);border-color:var(--orange)}
    /* ── Inventory ────────────────────── */
    .inv-panel{margin-top:8px;display:none}
    .inv-panel.open{display:block}
    .inv-scroll{
      display:flex;gap:6px;overflow-x:auto;padding:8px 2px;
      -webkit-overflow-scrolling:touch;
    }
    .inv-scroll.drop-hover{outline:2px dashed var(--orange);outline-offset:3px;border-radius:var(--radius)}
    .inv-tile{
      flex-shrink:0;width:52px;height:52px;border-radius:var(--radius);
      border:2.5px solid var(--border-lt);background:var(--panel);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-size:22px;cursor:pointer;position:relative;
      transition:transform .15s var(--spring),border-color .15s,box-shadow .15s;
      -webkit-tap-highlight-color:transparent;
      touch-action:none;
    }
    .inv-tile:hover{transform:translateY(-3px) scale(1.08)}
    .inv-tile:active{transform:scale(.9);transition-duration:.05s}
    .inv-tile.sel{border-color:var(--orange);box-shadow:0 0 12px rgba(212,136,74,.4),var(--inner-glow)}
    .inv-tile .iname{font-size:7px;font-weight:800;color:var(--ink-lt);margin-top:1px}
    .inv-tile .iqty{
      position:absolute;top:-4px;right:-4px;
      background:var(--orange);color:#fff;font-size:9px;font-weight:900;
      width:16px;height:16px;border-radius:50%;display:grid;place-items:center;
      box-shadow:0 1px 3px rgba(0,0,0,.2);
    }
    .inv-plus{
      flex-shrink:0;width:52px;height:52px;border-radius:var(--radius);
      border:2px dashed var(--border-lt);display:grid;place-items:center;
      font-size:20px;color:var(--border-lt);cursor:pointer;
      transition:transform .15s var(--spring),border-color .15s;
    }
    .inv-plus:hover{transform:scale(1.05);border-color:var(--orange);color:var(--orange)}
    /* ── Comfort meter ────────────────── */
    .comfort{
      display:flex;align-items:center;gap:8px;padding:8px 12px;
      border-radius:var(--radius);background:linear-gradient(135deg,#f0e8d4,#e8dcc4);
      border:2px solid var(--border-lt);margin-top:8px;
    }
    .comfort .c-label{font-size:12px;font-weight:800;color:var(--ink)}
    .comfort .c-stars{font-size:16px;letter-spacing:2px}
    .comfort .c-val{margin-left:auto;font-size:13px;font-weight:900;color:var(--orange)}
    /* ── Visitor ──────────────────────── */
    .visitor{
      display:flex;align-items:center;gap:10px;padding:10px 12px;
      border-radius:var(--radius);
      background:linear-gradient(135deg,rgba(143,168,130,.15),rgba(143,168,130,.08));
      border:2px solid rgba(143,168,130,.3);margin-top:8px;
      transition:transform .2s var(--spring);cursor:pointer;
      animation:slideUp .4s var(--spring) both;
    }
    .visitor:hover{transform:translateY(-1px)}
    .visitor .v-emo{font-size:28px}
    .visitor .v-txt{flex:1}
    .visitor .v-txt strong{display:block;font-size:12px;color:var(--ink)}
    .visitor .v-txt span{font-size:11px;color:var(--ink-lt);font-weight:600;font-style:italic}
    /* ── Shop Link ────────────────────── */
    .shop-link{
      display:flex;align-items:center;gap:8px;padding:10px 14px;
      border-radius:var(--radius);
      background:linear-gradient(135deg,rgba(212,136,74,.1),rgba(212,136,74,.05));
      border:2px solid rgba(212,136,74,.25);margin-top:8px;
      color:var(--ink);font-size:12px;font-weight:800;text-decoration:none;
      transition:transform .15s var(--spring),background .15s;cursor:pointer;
    }
    .shop-link:hover{transform:translateY(-2px);background:rgba(212,136,74,.15)}
    .shop-link .sl-arrow{margin-left:auto;font-size:14px}
    /* ── Toast ─────────────────────────── */
    .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.6);background:linear-gradient(180deg,rgba(253,243,227,.98),rgba(245,234,216,.98));border:3px solid var(--border);border-radius:var(--radius-lg);padding:18px 30px;text-align:center;box-shadow:0 12px 48px rgba(61,43,31,.35),var(--inner-glow);z-index:200;opacity:0;pointer-events:none;transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .2s;backdrop-filter:blur(12px);font-size:13px;font-weight:800;color:var(--ink)}
    .toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
    .drag-preview{
      position:fixed;left:0;top:0;z-index:400;pointer-events:none;
      width:54px;height:54px;border-radius:16px;
      display:grid;place-items:center;
      background:linear-gradient(180deg,rgba(253,243,227,.96),rgba(245,234,216,.96));
      border:2.5px solid var(--border-lt);
      box-shadow:0 10px 24px rgba(61,43,31,.18),var(--inner-glow);
      font-size:28px;
      transform:translate(-50%,-50%) scale(1.02);
    }
  </style>
</head>
<body>
<div class="toast" id="toast"></div>
<main class="phone">
  <div class="screen">

    <div class="hud">
      <div class="hud-avatar">🐰</div>
      <div class="hud-user">
        <strong>BunnyChef</strong>
        <span id="lvl">Lv. 24</span>
      </div>
      <div class="hud-gear" title="Impostazioni" style="cursor:pointer" id="gearBtn">⚙</div>
    </div>

    <div class="res-bar">
      <span class="res"><span class="icon">❤️</span> <span id="hp">87</span></span>
      <span class="res"><span class="icon">🪙</span> <span id="coins">12.450</span></span>
      <span class="res"><span class="icon">⭐</span> <span id="starCount">0</span></span>
    </div>

    <!-- ── The Room ─────────────────── -->
    <div class="house-wrap">
      <div class="house-room" id="room">
        <button class="edit-btn" id="editBtn" title="Modifica stanza">✏️</button>
        <div class="house-wall"><div class="wall-trim"></div></div>
        <div class="wall-slots" id="wallSlots"></div>
        <div class="house-floor"></div>
        <div class="room-bed" id="roomBed" title="Letto di Mimi">
          <div class="room-bed-shadow"></div>
          <div class="room-bed-frame"></div>
          <div class="room-bed-side"></div>
          <div class="room-bed-head"></div>
          <div class="room-bed-foot"></div>
          <div class="room-bed-mattress"></div>
          <div class="room-bed-front"></div>
          <div class="room-bed-blanket"></div>
          <div class="room-bed-pillows"><span></span><span></span></div>
          <div class="room-bed-zzz">Zzz</div>
        </div>
        <div class="floor-grid" id="floorGrid"></div>
      </div>
    </div>

    <!-- Inventory (edit mode only) -->
    <div class="panel inv-panel" id="invPanel">
      <span class="section-label">🎒 Inventario</span>
      <div class="inv-scroll" id="invBar"></div>
    </div>

    <!-- Comfort score -->
    <div class="comfort">
      <span class="c-label">🏠 Comfort</span>
      <span class="c-stars" id="cStars">☆☆☆☆☆</span>
      <span class="c-val" id="cVal">0/5</span>
    </div>

    <!-- Visitor (appears when comfort ≥ 1) -->
    <div class="visitor" id="visitor" style="display:none">
      <span class="v-emo" id="vEmo">🐱</span>
      <div class="v-txt">
        <strong id="vName">Mochi sta visitando!</strong>
        <span id="vMsg">"Che bella casa!"</span>
      </div>
    </div>

    <!-- Shop shortcut -->
    <a class="shop-link" href="shop.html">
      🛒 Vai al Negozio per comprare nuovi mobili!
      <span class="sl-arrow">→</span>
    </a>

  </div>

  <nav class="tab-bar">
    <a class="tab-link" href="../gallery.html"><span class="tab-icon">🎮</span>Galleria</a>
    <a class="tab-link active" href="hub.html"><span class="tab-icon">🏠</span>Casa</a>
    <a class="tab-link" href="shop.html"><span class="tab-icon">🛒</span>Negozio</a>
    <a class="tab-link" href="map.html"><span class="tab-icon">🗺️</span>Mappa</a>
    <a class="tab-link" href="../index.html"><span class="tab-icon">🐰</span>Pet</a>
  </nav>
</main>

<script>
(function(){
  /* ── Furniture catalogue (shared IDs with shop) ───── */
  const FURN={
    chair:{e:'🪑',n:'Sedia',w:false},
    sofa:{e:'🛋️',n:'Divano',w:false},
    plant:{e:'🪴',n:'Pianta',w:false},
    painting:{e:'🖼️',n:'Quadro',w:true},
    candle:{e:'🕯️',n:'Candela',w:false},
    plushie:{e:'🧸',n:'Peluche',w:false},
    bed:{e:'🛏️',n:'Letto',w:false},
    lamp:{e:'🪔',n:'Lampada',w:false},
    tv:{e:'📺',n:'TV',w:true},
    bookshelf:{e:'📚',n:'Libreria',w:false},
    clock:{e:'🕰️',n:'Orologio',w:true},
    xtable:{e:'🪵',n:'Tavolino',w:false},
    mirror:{e:'🪞',n:'Specchio',w:true},
    rug:{e:'🟤',n:'Tappeto',w:false},
    stove:{e:'🍳',n:'Fornello',w:false},
    fridge:{e:'🧊',n:'Frigo',w:false}
  };
  const COLS=5,ROWS=4,MAX_WALL=4;

  /* ── Persistent state (localStorage) ──────────────── */
  function load(k,fb){try{return JSON.parse(localStorage.getItem(k))}catch(e){}return fb}
  let inv   = load('metime_inv',[]);          // array of ids in inventory
  let floor = load('metime_floor',{});        // {"r-c":"id", ...}
  let wall  = load('metime_wall',[]);         // [id, id, ...]
  let coins = load('metime_coins',12450);
  let bedPos = load('metime_room_bed_pos',{ right:28, bottom:34 });

  let editing=false, selId=null, movingFloorPos=null, movingWallIndex=null;
  let draggingBed=false, dragOffset={x:0,y:0};
  let dragItem=null, dragPreview=null, dragHover=null, suppressNextTap=false, dragMoved=false;

  const $=s=>document.querySelector(s);
  function save(){
    localStorage.setItem('metime_inv',JSON.stringify(inv));
    localStorage.setItem('metime_floor',JSON.stringify(floor));
    localStorage.setItem('metime_wall',JSON.stringify(wall));
    localStorage.setItem('metime_coins',JSON.stringify(coins));
    localStorage.setItem('metime_room_bed_pos',JSON.stringify(bedPos));
  }
  function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
  function makeDragPreview(icon){
    const el=document.createElement('div');
    el.className='drag-preview';
    el.textContent=icon;
    document.body.appendChild(el);
    return el;
  }
  function moveDragPreview(x,y){
    if(!dragPreview)return;
    dragPreview.style.left=x+'px';
    dragPreview.style.top=y+'px';
  }
  function clearDropHover(){
    document.querySelectorAll('.drop-hover').forEach(el=>el.classList.remove('drop-hover'));
  }
  function applyDropHover(target){
    clearDropHover();
    if(!target)return;
    if(target.kind==='floor'){
      const cell=document.querySelector(`.floor-cell[data-pos="${target.pos}"]`);
      if(cell)cell.classList.add('drop-hover');
    }else if(target.kind==='wall'){
      const slot=document.querySelector(`.wall-slot[data-index="${target.index}"]`);
      if(slot)slot.classList.add('drop-hover');
    }else if(target.kind==='inventory'){
      const invBar=$('#invBar');
      if(invBar)invBar.classList.add('drop-hover');
    }
  }
  function endDrag(cancelled=false){
    if(dragPreview){dragPreview.remove();dragPreview=null;}
    clearDropHover();
    dragHover=null;
    if(dragItem&&dragMoved&&!cancelled)suppressNextTap=true;
    dragItem=null;
    dragMoved=false;
  }

  /* ── First visit: starter kit ─────────────────────── */
  if(!localStorage.getItem('metime_inv')&&!localStorage.getItem('metime_floor')){
    inv=['chair','plant','candle','rug'];
    floor={'1-2':'xtable','3-0':'plant'};
    wall=['painting'];
    save();
  }

  /* ── Build floor grid ─────────────────────────────── */
  function buildFloor(){
    const g=$('#floorGrid');g.innerHTML='';
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const cell=document.createElement('div');
        cell.className='floor-cell';
        const pos=r+'-'+c, id=floor[pos];
        cell.dataset.pos=pos;
        if(movingFloorPos===pos) cell.classList.add('sel');
        if(id&&FURN[id]){
          const s=document.createElement('span');
          s.className='placed';s.textContent=FURN[id].e;s.title=FURN[id].n;
          s.dataset.pos=pos;
          s.dataset.id=id;
          if(movingFloorPos===pos) s.classList.add('sel');
          s.addEventListener('pointerdown',(e)=>{
            if(!editing)return;
            beginObjectDrag(e,{ source:'floor', id, pos, wall:false, icon:FURN[id].e, name:FURN[id].n });
          });
          cell.appendChild(s);
        }
        cell.addEventListener('click',()=>tapFloor(r,c));
        g.appendChild(cell);
      }
    }
  }

  /* ── Build wall slots ─────────────────────────────── */
  function buildWall(){
    const w=$('#wallSlots');w.innerHTML='';
    for(let i=0;i<MAX_WALL;i++){
      const slot=document.createElement('div');
      slot.dataset.index=String(i);
      if(i<wall.length&&FURN[wall[i]]){
        slot.className='wall-slot';
        if(movingWallIndex===i) slot.classList.add('sel');
        slot.textContent=FURN[wall[i]].e;
        slot.title=FURN[wall[i]].n;
        slot.dataset.id=wall[i];
        slot.addEventListener('pointerdown',(e)=>{
          if(!editing)return;
          const id=wall[i];
          beginObjectDrag(e,{ source:'wall', id, index:i, wall:true, icon:FURN[id].e, name:FURN[id].n });
        });
        slot.addEventListener('click',()=>tapWall(i));
      }else{
        slot.className='wall-slot empty';
        slot.textContent='+';
        slot.addEventListener('click',()=>tapWallEmpty());
      }
      w.appendChild(slot);
    }
  }

  /* ── Build inventory ──────────────────────────────── */
  function buildInv(){
    const bar=$('#invBar');bar.innerHTML='';
    const counts={};inv.forEach(id=>{counts[id]=(counts[id]||0)+1});
    const seen=new Set();
    inv.forEach(id=>{
      if(seen.has(id))return;seen.add(id);
      const f=FURN[id];if(!f)return;
      const d=document.createElement('div');
      d.className='inv-tile'+(selId===id?' sel':'');
      d.dataset.id=id;
      d.innerHTML=f.e+'<span class="iname">'+f.n+'</span>'+(counts[id]>1?'<span class="iqty">'+counts[id]+'</span>':'');
      d.addEventListener('pointerdown',(e)=>{
        if(!editing)return;
        beginObjectDrag(e,{ source:'inventory', id, wall:f.w, icon:f.e, name:f.n });
      });
      d.addEventListener('click',()=>{
        if(suppressNextTap){suppressNextTap=false;return;}
        selId=selId===id?null:id;
        movingFloorPos=null;
        movingWallIndex=null;
        render();
        buildInv();
        if(selId){
          const furn=FURN[selId];
          toast(furn.w?'Tocca uno slot sulla parete':'Tocca una cella sul pavimento');
        }
      });
      bar.appendChild(d);
    });
    const plus=document.createElement('div');
    plus.className='inv-plus';plus.textContent='+';plus.title='Vai al Negozio';
    plus.addEventListener('click',()=>location.href='shop.html');
    bar.appendChild(plus);
  }

  function getDropTarget(x,y){
    const el=document.elementFromPoint(x,y);
    if(!el||!dragItem)return null;
    const invBar=el.closest('#invBar');
    if(invBar&&(dragItem.source==='floor'||dragItem.source==='wall')) return { kind:'inventory' };
    const floorCell=el.closest('.floor-cell');
    if(floorCell&&!dragItem.wall){
      const pos=floorCell.dataset.pos;
      if(dragItem.source==='inventory'&&floor[pos]) return null;
      return { kind:'floor', pos };
    }
    const wallSlot=el.closest('.wall-slot');
    if(wallSlot&&dragItem.wall){
      const index=Number(wallSlot.dataset.index);
      if(Number.isNaN(index)) return null;
      if(dragItem.source==='inventory'&&wallSlot.classList.contains('empty')) return { kind:'wall', index, empty:true };
      if(dragItem.source==='wall') return { kind:'wall', index, empty:wallSlot.classList.contains('empty') };
    }
    return null;
  }

  function applyObjectDrop(target){
    if(!dragItem||!target) return false;
    if(target.kind==='inventory'){
      if(dragItem.source==='floor'){
        delete floor[dragItem.pos];
        inv.push(dragItem.id);
      } else if(dragItem.source==='wall'){
        const [id]=wall.splice(dragItem.index,1);
        inv.push(id);
      } else {
        return false;
      }
      return true;
    }
    if(target.kind==='floor'){
      if(dragItem.wall) return false;
      if(dragItem.source==='inventory'){
        const idx=inv.indexOf(dragItem.id);
        if(idx<0||floor[target.pos]) return false;
        floor[target.pos]=dragItem.id;
        inv.splice(idx,1);
      } else if(dragItem.source==='floor'){
        if(target.pos===dragItem.pos) return false;
        const other=floor[target.pos];
        floor[target.pos]=dragItem.id;
        delete floor[dragItem.pos];
        if(other) floor[dragItem.pos]=other;
      } else {
        return false;
      }
      return true;
    }
    if(target.kind==='wall'){
      if(!dragItem.wall) return false;
      if(dragItem.source==='inventory'){
        if(!target.empty) return false;
        const idx=inv.indexOf(dragItem.id);
        if(idx<0||wall.length>=MAX_WALL) return false;
        wall.splice(Math.min(target.index, wall.length), 0, dragItem.id);
        inv.splice(idx,1);
      } else if(dragItem.source==='wall'){
        const [id]=wall.splice(dragItem.index,1);
        const insertAt=Math.min(target.index, wall.length);
        wall.splice(insertAt,0,id);
      } else {
        return false;
      }
      return true;
    }
    return false;
  }

  function beginObjectDrag(e,item){
    if(!editing) return;
    dragItem=item;
    dragMoved=false;
    dragPreview=makeDragPreview(item.icon);
    moveDragPreview(e.clientX,e.clientY);
    dragHover=null;
    clearDropHover();
    e.preventDefault();
  }

  /* ── Interactions ──────────────────────────────────── */
  function tapFloor(r,c){
    const pos=r+'-'+c;
    if(!editing){
      if(floor[pos])toast(FURN[floor[pos]].n);
      return;
    }
    if(floor[pos]){
      // pick up
      const id=floor[pos];delete floor[pos];inv.push(id);
      save();render();toast('↩️ '+FURN[id].n+' raccolto');
    }else if(selId&&FURN[selId]&&!FURN[selId].w){
      // place floor item
      const idx=inv.indexOf(selId);if(idx<0)return;
      floor[pos]=selId;inv.splice(idx,1);
      if(!inv.includes(selId))selId=null;
      save();render();toast('✅ '+FURN[floor[pos]].n+' posizionato!');
    }
  }
  function tapWall(i){
    if(!editing){toast(FURN[wall[i]].n);return}
    const id=wall.splice(i,1)[0];inv.push(id);
    save();render();toast('↩️ '+FURN[id].n+' rimosso dalla parete');
  }
  function tapWallEmpty(){
    if(!editing||!selId||!FURN[selId]||!FURN[selId].w)return;
    if(wall.length>=MAX_WALL){toast('🚫 Parete piena! (max '+MAX_WALL+')');return}
    const idx=inv.indexOf(selId);if(idx<0)return;
    wall.push(selId);inv.splice(idx,1);
    if(!inv.includes(selId))selId=null;
    save();render();toast('✅ Appeso alla parete!');
  }

  /* ── Comfort score ────────────────────────────────── */
  function calcComfort(){
    const n=Object.keys(floor).length+wall.length;
    const stars=Math.min(5,Math.floor(n/2));
    $('#cStars').textContent='⭐'.repeat(stars)+'☆'.repeat(5-stars);
    $('#cVal').textContent=stars+'/5';
    $('#starCount').textContent=stars;
    return stars;
  }

  /* ── Random visitor ───────────────────────────────── */
  function showVisitor(){
    const s=calcComfort();
    if(s<1){$('#visitor').style.display='none';return}
    const pool=[
      {e:'🐱',nm:'Mochi',m:'Che bella casa! Adoro la decorazione!'},
      {e:'🐻',nm:'Honey',m:'Mi piace stare qui, è così accogliente!'},
      {e:'🐥',nm:'Pip',m:'Wow, questa stanza è fantastica!'},
      {e:'🦊',nm:'Foxy',m:'Bellissima! Posso venire più spesso?'},
      {e:'🐸',nm:'Lily',m:'I mobili sono così carini!'},
      {e:'🦉',nm:'Gufo',m:'Un nido perfetto, complimenti!'}
    ];
    const v=pool[Math.floor(Math.random()*Math.min(pool.length,s+2))];
    $('#visitor').style.display='flex';
    $('#vEmo').textContent=v.e;
    $('#vName').textContent=v.nm+' sta visitando!';
    $('#vMsg').textContent='"'+v.m+'"';
  }

  /* ── Toggle edit mode ─────────────────────────────── */
  tapFloor=function(r,c){
    if(suppressNextTap){suppressNextTap=false;return;}
    const pos=r+'-'+c;
    if(!editing){
      if(floor[pos])toast(FURN[floor[pos]].n);
      return;
    }
    if(floor[pos]){
      if(movingFloorPos===pos){
        const id=floor[pos]; delete floor[pos]; inv.push(id); movingFloorPos=null;
        save(); render(); toast('â†©ï¸ '+FURN[id].n+' raccolto');
      } else {
        movingFloorPos=pos;
        movingWallIndex=null;
        selId=null;
        render();
        toast('Scegli una nuova cella per spostare '+FURN[floor[pos]].n);
      }
      return;
    }
    if(selId&&FURN[selId]&&!FURN[selId].w){
      const idx=inv.indexOf(selId); if(idx<0)return;
      floor[pos]=selId; inv.splice(idx,1);
      if(!inv.includes(selId))selId=null;
      save(); render(); toast('âœ… '+FURN[floor[pos]].n+' posizionato!');
      return;
    }
    if(movingFloorPos){
      const id=floor[movingFloorPos]; if(!id)return;
      delete floor[movingFloorPos];
      floor[pos]=id;
      movingFloorPos=null;
      save(); render(); toast('âœ… '+FURN[id].n+' spostato');
    }
  };

  tapWall=function(i){
    if(suppressNextTap){suppressNextTap=false;return;}
    if(!editing){toast(FURN[wall[i]].n);return}
    if(movingWallIndex===i){
      const id=wall.splice(i,1)[0]; inv.push(id); movingWallIndex=null;
      save(); render(); toast('â†©ï¸ '+FURN[id].n+' rimosso dalla parete');
      return;
    }
    movingWallIndex=i;
    movingFloorPos=null;
    selId=null;
    render();
    toast('Scegli uno slot vuoto per spostare '+FURN[wall[i]].n);
  };

  tapWallEmpty=function(){
    if(suppressNextTap){suppressNextTap=false;return;}
    if(!editing)return;
    if(movingWallIndex!==null){
      const [id]=wall.splice(movingWallIndex,1);
      wall.push(id);
      movingWallIndex=null;
      save(); render(); toast('âœ… '+FURN[id].n+' spostato sulla parete');
      return;
    }
    if(!selId||!FURN[selId]||!FURN[selId].w)return;
    if(wall.length>=MAX_WALL){toast('ðŸš« Parete piena! (max '+MAX_WALL+')');return}
    const idx=inv.indexOf(selId); if(idx<0)return;
    wall.push(selId); inv.splice(idx,1);
    if(!inv.includes(selId))selId=null;
    save(); render(); toast('âœ… Appeso alla parete!');
  };

  function applyBedPosition(){
    const bed=$('#roomBed');
    bed.style.right=bedPos.right+'px';
    bed.style.bottom=bedPos.bottom+'px';
  }

  function toggleEdit(){
    editing=!editing;selId=null;movingFloorPos=null;movingWallIndex=null;
    $('#room').classList.toggle('edit-mode',editing);
    $('#editBtn').classList.toggle('on',editing);
    $('#invPanel').classList.toggle('open',editing);
    render();
    toast(editing?'✏️ Modalità modifica — sposta i mobili!':'✅ Modifiche salvate!');
  }

  /* ── Render ────────────────────────────────────────── */
  function render(){
    buildFloor();buildWall();
    if(editing)buildInv();
    applyBedPosition();
    showVisitor();
    $('#coins').textContent=coins.toLocaleString('it-IT');
  }

  /* ── Events ────────────────────────────────────────── */
  $('#editBtn').addEventListener('click',toggleEdit);
  $('#gearBtn').addEventListener('click',()=>toast('⚙ Impostazioni (in arrivo)'));
  $('#visitor').addEventListener('click',()=>toast('💬 '+$('#vName').textContent));

  window.addEventListener('pointermove',(e)=>{
    if(!dragItem)return;
    dragMoved=true;
    moveDragPreview(e.clientX,e.clientY);
    dragHover=getDropTarget(e.clientX,e.clientY);
    applyDropHover(dragHover);
  });
  window.addEventListener('pointerup',()=>{
    if(!dragItem)return;
    const movedName=dragItem.name;
    const dropped=applyObjectDrop(dragHover);
    endDrag(false);
    render();
    if(dropped){
      save();
      toast(movedName+' spostato');
    }
  });
  window.addEventListener('pointercancel',()=>{
    if(!dragItem)return;
    endDrag(true);
    render();
  });
  $('#roomBed').addEventListener('pointerdown',(e)=>{
    if(!editing)return;
    const room=$('#room');
    const bed=$('#roomBed');
    const roomRect=room.getBoundingClientRect();
    const bedRect=bed.getBoundingClientRect();
    draggingBed=true;
    dragOffset.x=e.clientX-bedRect.left;
    dragOffset.y=e.clientY-bedRect.top;
    bed.classList.add('dragging');
    bed.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  $('#roomBed').addEventListener('pointermove',(e)=>{
    if(!draggingBed||!editing)return;
    const roomRect=$('#room').getBoundingClientRect();
    const bed=$('#roomBed');
    const maxLeft=roomRect.width-bed.offsetWidth;
    const maxTop=roomRect.height-bed.offsetHeight;
    const nextLeft=Math.max(0, Math.min(maxLeft, e.clientX-roomRect.left-dragOffset.x));
    const nextTop=Math.max(0, Math.min(maxTop, e.clientY-roomRect.top-dragOffset.y));
    bedPos.right=Math.round(roomRect.width-bed.offsetWidth-nextLeft);
    bedPos.bottom=Math.round(roomRect.height-bed.offsetHeight-nextTop);
    applyBedPosition();
  });
  $('#roomBed').addEventListener('pointerup',()=>{
    if(!draggingBed)return;
    draggingBed=false;
    $('#roomBed').classList.remove('dragging');
    save();
  });
  $('#roomBed').addEventListener('pointercancel',()=>{
    draggingBed=false;
    $('#roomBed').classList.remove('dragging');
  });
  $('#roomBed').addEventListener('click',()=>{
    if(editing)return;
    const bed=$('#roomBed');
    bed.classList.add('resting');
    toast('Mimi si riposa nella sua stanza');
    setTimeout(()=>bed.classList.remove('resting'),2200);
  });

  render();
})();
</script>
