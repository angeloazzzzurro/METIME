<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>METIME — Sfida Trovata</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/game.css"/>
  <style>
    body{
      background:
        radial-gradient(900px 500px at 50% 50%,rgba(61,43,31,.4),transparent),
        linear-gradient(175deg,var(--bg-sage),var(--bg-cream));
    }
    .phone{
      background:transparent;
      border:0;
      box-shadow:none;
    }
    .phone::before{display:none}

    .game-bg{
      position:fixed;
      inset:0;
      background:
        radial-gradient(800px at 50% 50%,rgba(168,201,160,.3),transparent),
        linear-gradient(180deg,#8fa882,#6a8860);
      filter:blur(4px);
      z-index:0;
    }
    .game-bg .bg-char{
      position:absolute;
      font-size:120px;
      opacity:.15;
      bottom:10%;
      right:5%;
    }

    .match-overlay{
      position:fixed;
      inset:0;
      background:rgba(61,43,31,.6);
      backdrop-filter:blur(8px);
      z-index:100;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .match-card{
      width:min(340px,90vw);
      border-radius:var(--radius-lg);
      border:3px solid var(--border);
      background:var(--panel);
      box-shadow:0 24px 48px rgba(61,43,31,.4),var(--inner-glow);
      padding:28px 24px;
      text-align:center;
      animation:modalIn .4s var(--ease) both;
    }

    .match-title{
      font-family:'Playfair Display',serif;
      font-size:26px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.06em;
      color:var(--ink);
      margin:0 0 4px;
    }
    .room-id{
      font-size:12px;
      font-weight:700;
      color:var(--ink-lt);
      margin-bottom:16px;
    }
    .countdown-wrap{
      margin:20px 0;
    }
    .status-text{
      font-size:13px;
      font-weight:700;
      color:var(--ink-lt);
      margin-top:16px;
    }
    .status-text.waiting{
      animation:pulse 1.6s ease-in-out infinite;
    }
  </style>
</head>
<body>

  <!-- Simulated game background (blurred) -->
  <div class="game-bg">
    <div class="bg-char">🐰</div>
  </div>

  <!-- Match overlay -->
  <div class="match-overlay">
    <div class="match-card">
      <h2 class="match-title">⚔️ Sfida Trovata!</h2>
      <p class="room-id">Stanza #A7X-3291</p>

      <div class="countdown-wrap">
        <div class="countdown-num" id="countdown">10</div>
      </div>

      <button class="btn btn--primary" style="padding:14px 48px;font-size:16px" id="acceptBtn">
        ✅ Accetta
      </button>

      <p class="status-text waiting" id="statusText">Ricerca sfida, attendere...</p>
    </div>
  </div>

<script>
  let count = 10;
  const el = document.getElementById('countdown');
  const statusEl = document.getElementById('statusText');
  const acceptBtn = document.getElementById('acceptBtn');

  statusEl.textContent = 'Sfida pronta! Accetta entro il conto alla rovescia.';
  statusEl.classList.remove('waiting');

  const timer = setInterval(() => {
    count--;
    el.textContent = count;
    if (count <= 0) {
      clearInterval(timer);
      el.textContent = '0';
      statusEl.textContent = 'Tempo scaduto!';
      acceptBtn.style.opacity = '.4';
      acceptBtn.style.pointerEvents = 'none';
    }
  }, 1000);

  acceptBtn.addEventListener('click', () => {
    clearInterval(timer);
    statusEl.textContent = 'Ingresso in battaglia...';
    statusEl.classList.add('waiting');
    acceptBtn.style.opacity = '.4';
    acceptBtn.style.pointerEvents = 'none';
  });
</script>
</body>
</html>
