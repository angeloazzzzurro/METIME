<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>METIME – Mockups</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      font-family: "Avenir Next", "SF Pro Rounded", "Trebuchet MS", sans-serif;
      background: #c0d8c0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 14px 0 32px;
    }

    .phone {
      width: min(390px, 96vw);
      min-height: calc(100dvh - 28px);
      background: #e8f4e8;
      border-radius: 52px;
      border: 2px solid rgba(255,255,255,0.5);
      box-shadow: 0 32px 72px rgba(60,120,60,0.22), inset 0 2px 0 rgba(255,255,255,0.85);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .notch {
      width: 36%; height: 28px;
      background: #1a0f2e;
      border-radius: 0 0 18px 18px;
      margin: 0 auto;
      flex-shrink: 0;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 0;
    }
    .back-link {
      font-size: 24px;
      color: #3a4a3a;
      text-decoration: none;
      font-weight: 300;
      line-height: 1;
    }
    .bar-title {
      font-size: 16px;
      font-weight: 700;
      color: #1a2a1a;
    }
    .edit-icon {
      font-size: 18px;
    }

    /* Main title */
    h1 {
      font-size: 28px;
      font-weight: 900;
      color: #1a2a1a;
      margin: 14px 20px 20px;
    }

    /* Cards list */
    .cards-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin: 0 20px;
    }

    .screen-card {
      border-radius: 22px;
      padding: 20px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 110px;
      text-decoration: none;
      box-shadow: 0 6px 24px rgba(0,0,0,0.14);
      transition: transform 0.12s;
    }
    .screen-card:active { transform: scale(0.97); }

    .sc-garden  { background: linear-gradient(135deg, #34a058, #2d8a4a); }
    .sc-care    { background: linear-gradient(135deg, #f97316, #ea580c); }
    .sc-journal { background: linear-gradient(135deg, #3b82f6, #2563eb); }

    .card-h2 {
      font-size: 20px;
      font-weight: 900;
      color: white;
      margin-bottom: 0;
    }
    .card-p {
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      margin-top: 6px;
      line-height: 1.4;
    }
    .card-arrow {
      align-self: flex-end;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: grid;
      place-items: center;
      font-size: 16px;
      color: white;
      margin-top: 14px;
    }
  </style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>

  <div class="top-bar">
    <a class="back-link" href="index.html">‹</a>
    <span class="bar-title">METIME Mockups</span>
    <span class="edit-icon">✏️</span>
  </div>

  <h1>METIME Mockups</h1>

  <div class="cards-list">

    <div class="screen-card sc-garden" onclick="window.location='index.html'">
      <div>
        <div class="card-h2">Garden Home</div>
        <p class="card-p">Vista principale con pet, progressi e azioni rapide</p>
      </div>
      <span class="card-arrow">↩</span>
    </div>

    <div class="screen-card sc-care" onclick="window.location='pages/care-ritual.html'">
      <div>
        <div class="card-h2">Care Ritual</div>
        <p class="card-p">Sessione mindful con timer, respiro e ricompensa</p>
      </div>
      <span class="card-arrow">→</span>
    </div>

    <div class="screen-card sc-journal" onclick="window.location='pages/journal.html'">
      <div>
        <div class="card-h2">Journal Insights</div>
        <p class="card-p">Mood tracking e riflessioni giornaliere</p>
      </div>
      <span class="card-arrow">→</span>
    </div>

  </div>
</div>
</body>
</html>
