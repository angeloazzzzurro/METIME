name: METIME
options:
  bundleIdPrefix: com.metime
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    # ── Strict Concurrency (sicurezza threading) ──────────────────────────────
    SWIFT_STRICT_CONCURRENCY: complete

targets:

  # ── Main App ──────────────────────────────────────────────────────────────
  METIME:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    bundleId: com.metime.app
    sources:
      - path: App        # METIMEApp.swift, AppState.swift, Resources.swift
      - path: Audio
      - path: Creature
      - path: Garden
      - path: Data
      - path: UI
      - path: Resources
      - path: House      # HouseScene.swift, HouseView.swift
      - path: Store      # HouseItem.swift, InventoryModel.swift, HouseStore.swift
    resources:
      - path: Resources
      # PrivacyInfo.xcprivacy — richiesto da Apple per App Store (iOS 17+)
      - path: App/Resources/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metime.app
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: METIME.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # ── Data Protection ───────────────────────────────────────────────────
        # Cifra i file dell'app con la chiave derivata dal passcode utente.
        # Valore: NSFileProtectionCompleteUnlessOpen
        # I file sono accessibili dopo il primo sblocco del dispositivo.
        DATA_PROTECTION_CLASS: NSFileProtectionCompleteUnlessOpen
    # ── Entitlements (Data Protection capability) ─────────────────────────────
    entitlements:
      path: METIME.entitlements
      properties:
        com.apple.developer.default-data-protection: NSFileProtectionCompleteUnlessOpen

  # ── Unit Tests ────────────────────────────────────────────────────────────
  METIMETests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    bundleId: com.metime.app.tests
    sources:
      - path: Tests/METIMETests
    dependencies:
      - target: METIME
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metime.app.tests
        SWIFT_STRICT_CONCURRENCY: complete

  # ── UI Tests ──────────────────────────────────────────────────────────────
  METIMEUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    bundleId: com.metime.app.uitests
    sources:
      - path: Tests/METIMEUITests
    dependencies:
      - target: METIME
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metime.app.uitests
        TEST_TARGET_NAME: METIME
