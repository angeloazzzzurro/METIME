<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>METIME – Journal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      font-family: "Avenir Next", "SF Pro Rounded", "Trebuchet MS", sans-serif;
      background: #b8cce8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 14px 0 32px;
    }

    .phone {
      width: min(390px, 96vw);
      min-height: calc(100dvh - 28px);
      background: linear-gradient(180deg, #e8f0ff 0%, #dce8ff 100%);
      border-radius: 52px;
      border: 2px solid rgba(255,255,255,0.5);
      box-shadow: 0 32px 72px rgba(60,100,180,0.22), inset 0 2px 0 rgba(255,255,255,0.85);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .notch {
      width: 36%; height: 28px;
      background: #1a0f2e;
      border-radius: 0 0 18px 18px;
      margin: 0 auto;
      flex-shrink: 0;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 20px 0;
      position: relative;
    }
    .back-link {
      position: absolute;
      left: 20px;
      font-size: 20px;
      color: #4a5a80;
      text-decoration: none;
      font-weight: 300;
    }
    .bar-title {
      font-size: 16px;
      font-weight: 600;
      color: #3a4a70;
    }

    /* Main title */
    h1 {
      font-size: 28px;
      font-weight: 900;
      color: #1a2040;
      margin: 14px 20px 16px;
    }

    /* Cards row */
    .cards-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 0 20px 20px;
    }
    .stat-card {
      border-radius: 16px;
      padding: 14px;
    }
    .sc-streak {
      background: linear-gradient(135deg, #c8dcff, #a8c8ff);
    }
    .sc-mood {
      background: linear-gradient(135deg, #c0f0e0, #90d8c0);
    }
    .card-label {
      font-size: 11px;
      font-weight: 700;
      color: #4a5a80;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .sc-mood .card-label {
      color: #1a6050;
    }
    .card-value {
      font-size: 26px;
      font-weight: 900;
      color: #1a2a60;
      margin-top: 4px;
    }
    .sc-mood .card-value {
      font-size: 22px;
      color: #0a4030;
    }

    /* Section title */
    .section-title {
      font-size: 18px;
      font-weight: 800;
      color: #1a2040;
      margin: 0 20px 12px;
    }

    /* Entry list */
    .entry-list {
      margin: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .entry-card {
      background: white;
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 2px 8px rgba(60,80,140,0.08);
    }
    .entry-title {
      font-size: 15px;
      font-weight: 700;
      color: #1a2040;
      margin-bottom: 4px;
    }
    .entry-sub {
      font-size: 12px;
      color: #6a7a9a;
    }
  </style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>

  <div class="top-bar">
    <a class="back-link" href="../index.html">‹</a>
    <span class="bar-title">Journal</span>
  </div>

  <h1>Journal &amp; Insights</h1>

  <div class="cards-row">
    <div class="stat-card sc-streak">
      <div class="card-label">Streak</div>
      <div class="card-value">9 giorni</div>
    </div>
    <div class="stat-card sc-mood">
      <div class="card-label">Mood Medio</div>
      <div class="card-value">Sereno</div>
    </div>
  </div>

  <div class="section-title">Ultime riflessioni</div>

  <div class="entry-list">
    <div class="entry-card">
      <div class="entry-title">Oggi ho dato acqua al pet prima di lavorare</div>
      <div class="entry-sub">Molto presente</div>
    </div>
    <div class="entry-card">
      <div class="entry-title">Ho fatto 6 minuti di meditazione guidata</div>
      <div class="entry-sub">Più calma</div>
    </div>
    <div class="entry-card">
      <div class="entry-title">Passeggiata breve nel pomeriggio</div>
      <div class="entry-sub">Energia in risalita</div>
    </div>
  </div>
</div>
</body>
</html>
