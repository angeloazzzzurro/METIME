<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>METIME — Hub Principale</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/game.css"/>
  <style>
    .iso-room{min-height:300px;cursor:pointer}
    .furniture{position:absolute;z-index:2;cursor:pointer;transition:transform .15s,box-shadow .15s}
    .furniture:hover{transform:scale(1.08);filter:brightness(1.1)}
    .furniture.bounce{animation:fBounce .35s}
    @keyframes fBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
    .table{bottom:25%;left:20%;width:60px;height:35px;border-radius:6px;background:linear-gradient(180deg,#c8a878,#a88858);border:2px solid var(--border);box-shadow:0 4px 0 rgba(61,43,31,.2)}
    .counter{bottom:20%;right:12%;width:70px;height:40px;border-radius:8px 8px 4px 4px;background:linear-gradient(180deg,#d8c8a8,#b8a888);border:2px solid var(--border)}
    .stove{top:58%;left:55%;width:50px;height:50px;border-radius:8px;background:linear-gradient(180deg,#888,#666);border:2px solid #555;display:grid;place-items:center;font-size:22px}
    .npc{position:absolute;z-index:3;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .15s}
    .npc:hover{transform:scale(1.1)}
    .npc-body{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);display:grid;place-items:center;font-size:18px;box-shadow:0 3px 6px rgba(61,43,31,.15);transition:box-shadow .15s}
    .npc:hover .npc-body{box-shadow:0 4px 12px rgba(61,43,31,.3)}
    .customer1{bottom:30%;left:18%}.customer1 .npc-body{background:linear-gradient(135deg,#f8d0d0,#e8a8a8)}
    .customer2{bottom:28%;left:35%}.customer2 .npc-body{background:linear-gradient(135deg,#d0e8f0,#a8c8d8)}
    .chef-npc{bottom:25%;right:18%}.chef-npc .npc-body{background:linear-gradient(135deg,#fff8e8,#f0e0c0)}
    .npc-name{margin-top:2px;font-size:8px;font-weight:800;color:var(--ink);background:rgba(253,243,227,.85);padding:1px 5px;border-radius:4px}
    .npc-bubble{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--panel);border:2px solid var(--border-lt);border-radius:10px;padding:6px 10px;font-size:10px;font-weight:700;color:var(--ink);white-space:nowrap;box-shadow:var(--shadow-sm);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:10}
    .npc-bubble.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
    .npc-bubble::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--border-lt)}
    .order-icon{position:absolute;top:-8px;right:-8px;font-size:16px;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--panel);border:2px solid var(--border);border-radius:var(--radius);padding:10px 18px;font-size:12px;font-weight:800;color:var(--ink);box-shadow:var(--shadow-md);z-index:100;transition:transform .3s var(--ease);pointer-events:none}
    .toast.show{transform:translateX(-50%) translateY(0)}
    .order-panel{margin-top:10px;border-radius:var(--radius);background:linear-gradient(135deg,#f0e8d4,#e8dcc4);border:2px solid var(--border-lt);padding:10px;display:none}
    .order-panel.open{display:block}
    .order-item{display:flex;align-items:center;gap:8px;padding:6px;border-radius:8px;background:var(--panel);border:1px solid var(--border-lt);margin-bottom:6px}
    .order-item .oi-emoji{font-size:24px}
    .order-item .oi-info{flex:1;font-size:11px;font-weight:700;color:var(--ink)}
    .order-item .oi-sub{font-size:9px;color:var(--ink-lt)}
    .order-item .btn{font-size:10px;padding:4px 10px}
    .stove.cooking{animation:cookGlow 1s infinite alternate}
    @keyframes cookGlow{from{box-shadow:0 0 8px rgba(255,160,60,.3)}to{box-shadow:0 0 18px rgba(255,160,60,.7)}}
  </style>
</head>
<body>
<div class="toast" id="toast"></div>
<main class="phone">
  <div class="screen">

    <div class="hud">
      <div class="hud-avatar">🐰</div>
      <div class="hud-user">
        <strong>BunnyChef</strong>
        <span id="lvl">Lv. 24</span>
      </div>
      <div class="hud-gear" title="Impostazioni" style="cursor:pointer" id="gearBtn">⚙</div>
    </div>

    <div class="res-bar">
      <span class="res"><span class="icon">❤️</span> <span id="hp">87</span></span>
      <span class="res"><span class="icon">🪙</span> <span id="coins">12.450</span></span>
      <span class="res"><span class="icon">⚡</span> <span id="energy">63</span></span>
    </div>

    <div class="iso-room" id="room">
      <div class="wall"></div>
      <div class="iso-floor"></div>

      <div class="furniture table" data-action="table" title="Clicca per servire"></div>
      <div class="furniture counter" data-action="counter" title="Clicca per preparare"></div>
      <div class="furniture stove" data-action="stove" title="Clicca per cucinare" id="stove">🍳</div>

      <div class="npc customer1" data-customer="Mochi" data-order="🥞" data-want="Pancake al Miele">
        <div class="npc-bubble" id="bubble-mochi"></div>
        <span class="order-icon">❗</span>
        <div class="npc-body">🐱</div>
        <span class="npc-name">Mochi</span>
      </div>
      <div class="npc customer2" data-customer="Honey" data-order="🍰" data-want="Torta Morbida">
        <div class="npc-bubble" id="bubble-honey"></div>
        <span class="order-icon">❗</span>
        <div class="npc-body">🐻</div>
        <span class="npc-name">Honey</span>
      </div>
      <div class="npc chef-npc" id="chefNpc">
        <div class="npc-bubble" id="bubble-chef"></div>
        <div class="npc-body">🐰</div>
        <span class="npc-name">Chef Tu</span>
      </div>
    </div>

    <!-- Pannello ordini -->
    <div class="order-panel" id="orderPanel">
      <span class="section-label">📋 Ordini in attesa</span>
      <div id="orderList"></div>
    </div>

    <!-- Stato ristorante -->
    <div style="padding:8px 4px">
      <div class="flex items-center justify-between mb-8">
        <span class="section-label" style="margin:0">Soddisfazione</span>
        <span class="text-xs font-bold" id="satLabel" style="color:var(--ink-lt)">78%</span>
      </div>
      <div class="progress"><div class="progress-fill" id="satBar" style="width:78%"></div></div>
    </div>

  </div>

  <nav class="tab-bar">
    <a class="tab-link" href="../gallery.html"><span class="tab-icon">🎮</span>Galleria</a>
    <a class="tab-link active" href="hub.html"><span class="tab-icon">🏠</span>Hub</a>
    <a class="tab-link" href="shop.html"><span class="tab-icon">🛒</span>Negozio</a>
    <a class="tab-link" href="map.html"><span class="tab-icon">🗺️</span>Mappa</a>
    <a class="tab-link" href="../index.html"><span class="tab-icon">🐰</span>Pet</a>
  </nav>
</main>

<script>
(function(){
  const state = {
    coins: 12450, hp: 87, energy: 63, satisfaction: 78, xp: 0,
    orders: [
      {id:1,customer:'Mochi',emoji:'🥞',dish:'Pancake al Miele',reward:150,done:false},
      {id:2,customer:'Honey',emoji:'🍰',dish:'Torta Morbida',reward:200,done:false}
    ],
    cooking: false
  };

  const $ = s => document.querySelector(s);
  const $$ = s => document.querySelectorAll(s);

  function toast(msg){
    const t=$('#toast');t.textContent=msg;t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2200);
  }

  function updateUI(){
    $('#coins').textContent=state.coins.toLocaleString('it-IT');
    $('#hp').textContent=state.hp;
    $('#energy').textContent=state.energy;
    $('#satLabel').textContent=state.satisfaction+'%';
    $('#satBar').style.width=state.satisfaction+'%';
    renderOrders();
  }

  function renderOrders(){
    const list=$('#orderList');
    const pending=state.orders.filter(o=>!o.done);
    if(!pending.length){list.innerHTML='<p style="text-align:center;font-size:11px;color:var(--ink-lt);font-weight:700;padding:8px">Nessun ordine in attesa! 🎉</p>';return}
    list.innerHTML=pending.map(o=>`
      <div class="order-item">
        <span class="oi-emoji">${o.emoji}</span>
        <div class="oi-info">${o.dish}<br><span class="oi-sub">da ${o.customer} — 🪙 ${o.reward}</span></div>
        <button class="btn btn--primary btn--sm" onclick="cookOrder(${o.id})">Cucina!</button>
      </div>`).join('');
  }

  window.cookOrder = function(id){
    if(state.cooking){toast('⏳ Stai già cucinando!');return}
    if(state.energy<10){toast('⚡ Energia insufficiente!');return}
    const order=state.orders.find(o=>o.id===id);
    if(!order||order.done)return;
    state.cooking=true;state.energy-=10;
    const stove=$('#stove');stove.classList.add('cooking');stove.textContent='🔥';
    toast('🍳 Cucinando '+order.dish+'...');
    updateUI();
    setTimeout(()=>{
      order.done=true;state.cooking=false;
      state.coins+=order.reward;state.xp+=25;
      state.satisfaction=Math.min(100,state.satisfaction+8);
      state.hp=Math.min(100,state.hp+5);
      stove.classList.remove('cooking');stove.textContent='🍳';
      toast('✅ '+order.dish+' servito a '+order.customer+'! +🪙'+order.reward);

      // hide order icon on NPC
      const npcEl=[...$$('.npc[data-customer]')].find(n=>n.dataset.customer===order.customer);
      if(npcEl){
        const icon=npcEl.querySelector('.order-icon');if(icon)icon.style.display='none';
        showBubble(npcEl,'Grazie! 😋💕');
      }

      // spawn new order after a delay
      setTimeout(()=>{
        const newDishes=[
          {emoji:'🍜',dish:'Ramen Speciale',reward:180},
          {emoji:'🍣',dish:'Sushi Misto',reward:220},
          {emoji:'🥧',dish:'Crostata di Frutta',reward:160},
          {emoji:'🧁',dish:'Cupcake Magico',reward:130}
        ];
        const d=newDishes[Math.floor(Math.random()*newDishes.length)];
        const names=['Mochi','Honey','Pip','Foxy','Lily'];
        const name=names[Math.floor(Math.random()*names.length)];
        state.orders.push({id:Date.now(),customer:name,emoji:d.emoji,dish:d.dish,reward:d.reward,done:false});
        toast('📋 Nuovo ordine da '+name+'!');
        updateUI();
      },4000);

      updateUI();
    },3000);
  };

  function showBubble(npcEl,text){
    const bubble=npcEl.querySelector('.npc-bubble');
    if(!bubble)return;
    bubble.textContent=text;bubble.classList.add('show');
    setTimeout(()=>bubble.classList.remove('show'),2500);
  }

  // NPC click — show speech bubble
  $$('.npc[data-customer]').forEach(npc=>{
    npc.addEventListener('click',()=>{
      const order=state.orders.find(o=>o.customer===npc.dataset.customer&&!o.done);
      if(order)showBubble(npc,'Vorrei '+order.dish+'! '+order.emoji);
      else showBubble(npc,'Tutto delizioso! 😊');
    });
  });

  // Chef NPC click
  $('#chefNpc').addEventListener('click',()=>{
    showBubble($('#chefNpc'),state.cooking?'Sto cucinando... 🔥':'Pronto a cucinare! 👨‍🍳');
  });

  // Furniture interactions
  $$('.furniture').forEach(f=>{
    f.addEventListener('click',()=>{
      f.classList.add('bounce');setTimeout(()=>f.classList.remove('bounce'),350);
      const action=f.dataset.action;
      if(action==='stove'){
        const pending=state.orders.find(o=>!o.done);
        if(pending)cookOrder(pending.id);
        else toast('📋 Nessun ordine da cucinare');
      }else if(action==='table'){
        toast('🍽️ Il tavolo è pronto per i clienti!');
      }else if(action==='counter'){
        $('#orderPanel').classList.toggle('open');
      }
    });
  });

  // Gear button
  $('#gearBtn').addEventListener('click',()=>toast('⚙ Impostazioni (in arrivo)'));

  // Toggle order panel from section label
  $('#orderPanel').previousElementSibling || null;

  updateUI();
  // Auto-open orders
  setTimeout(()=>$('#orderPanel').classList.add('open'),500);
})();
</script>
</body>
</html>
