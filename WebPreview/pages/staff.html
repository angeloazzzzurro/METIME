<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>METIME — Personale</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/game.css"/>
  <style>
    .staff-layout{display:grid;gap:12px}
    @media(min-width:380px){.staff-layout{grid-template-columns:1fr 140px}}
    .staff-detail{display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px;border-radius:var(--radius-lg);background:linear-gradient(135deg,#f0e8d4,#e8dcc4);border:2.5px solid var(--border-lt);transition:border-color .25s cubic-bezier(.34,1.56,.64,1),transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s}
    .staff-detail.active{border-color:var(--orange);transform:scale(1.02);box-shadow:0 6px 20px rgba(212,136,74,.2)}
    .staff-detail .big-avatar{width:80px;height:80px;border-radius:50%;border:3px solid var(--border);background:linear-gradient(135deg,#fde8d0,#f0c8a0);display:grid;place-items:center;font-size:40px;box-shadow:0 6px 16px rgba(61,43,31,.2);transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
    .staff-detail .big-avatar:hover{transform:scale(1.1) rotate(-3deg)}
    .staff-detail .staff-name{font-size:16px;font-weight:900;color:var(--ink);text-transform:uppercase;letter-spacing:.03em}
    .staff-stats{width:100%;display:grid;gap:8px}
    .roster-counter{display:inline-flex;padding:5px 12px;border-radius:999px;background:linear-gradient(180deg,#f0e8d4,#e0d4c0);border:2.5px solid var(--border-lt);font-size:11px;font-weight:800;color:var(--ink-mid);box-shadow:var(--inner-glow)}
    .avatar-circle{cursor:pointer;transition:transform .2s cubic-bezier(.34,1.56,.64,1),border-color .15s}
    .avatar-circle:hover{transform:scale(1.15) translateY(-2px)}
    .avatar-circle.selected{border:3px solid var(--orange)!important;box-shadow:0 0 12px rgba(212,136,74,.5);animation:selectPop .3s cubic-bezier(.34,1.56,.64,1)}
    @keyframes selectPop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
    .avatar-slot .label{transition:color .15s}
    .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.6);background:linear-gradient(180deg,rgba(253,243,227,.98),rgba(245,234,216,.98));border:3px solid var(--border);border-radius:var(--radius-lg);padding:18px 30px;text-align:center;box-shadow:0 12px 48px rgba(61,43,31,.35),var(--inner-glow);z-index:200;opacity:0;pointer-events:none;transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .2s;backdrop-filter:blur(12px);font-size:13px;font-weight:800;color:var(--ink)}
    .toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
    .start-btn{transition:all .25s cubic-bezier(.34,1.56,.64,1)}
    .start-btn.running{background:var(--rose)!important;border-color:var(--rose)!important;animation:runPulse 1s ease-in-out infinite}
    @keyframes runPulse{0%,100%{box-shadow:0 4px 0 rgba(232,160,160,.3)}50%{box-shadow:0 4px 20px rgba(232,160,160,.5)}}
  </style>
</head>
<body>
<div class="toast" id="toast"></div>
<main class="phone">
  <div class="screen">

    <div class="page-hdr">
      <h1 class="page-title">Personale</h1>
      <button class="close-btn" onclick="history.back()">✕</button>
    </div>

    <div class="panel panel--wood panel--fancy floral">

      <span class="section-label">Chef al Lavoro</span>
      <div class="avatar-grid mb-12" id="workingGrid"></div>

      <div class="staff-layout">
        <div>
          <div class="flex items-center justify-between mb-8">
            <span class="section-label" style="margin:0">Lista Staff</span>
            <span class="roster-counter" id="rosterCount">Possiedi: 6/12</span>
          </div>
          <div class="h-scroll" id="rosterScroll"></div>
        </div>

        <div class="staff-detail" id="staffDetail">
          <div class="big-avatar" id="detailAvatar">🐱</div>
          <span class="staff-name" id="detailName">Mochi</span>
          <div class="staff-stats" id="detailStats"></div>
        </div>
      </div>

      <button class="btn btn--primary w-full mt-12 start-btn" id="startBtn">▶️ Avvia Turno</button>

    </div>
  </div>

  <nav class="tab-bar">
    <a class="tab-link" href="../gallery.html"><span class="tab-icon">🎮</span>Galleria</a>
    <a class="tab-link" href="hub.html"><span class="tab-icon">🏠</span>Casa</a>
    <a class="tab-link" href="shop.html"><span class="tab-icon">🛒</span>Negozio</a>
    <a class="tab-link" href="map.html"><span class="tab-icon">🗺️</span>Mappa</a>
    <a class="tab-link" href="../index.html"><span class="tab-icon">🐰</span>Pet</a>
  </nav>
</main>

<script>
(function(){
  const staff=[
    {name:'Mochi',emoji:'🐱',speed:78,skill:85,luck:62,working:true},
    {name:'Bun',emoji:'🐰',speed:65,skill:70,luck:80,working:true},
    {name:'Pip',emoji:'🐥',speed:90,skill:60,luck:55,working:true},
    {name:'Honey',emoji:'🐻',speed:55,skill:90,luck:70,working:false},
    {name:'Foxy',emoji:'🦊',speed:82,skill:75,luck:88,working:false},
    {name:'Lily',emoji:'🐸',speed:70,skill:68,luck:92,working:false},
  ];
  let selected=0,running=false;

  const $=s=>document.querySelector(s);
  const toast=m=>{const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)};

  function barClass(val){return val>=80?'progress-fill':val>=60?'progress-fill--orange progress-fill':'progress-fill--rose progress-fill'}

  function render(){
    // Working grid
    const working=staff.filter(s=>s.working);
    const maxSlots=5;
    let whtml='';
    for(let i=0;i<maxSlots;i++){
      if(i<working.length){
        const s=working[i];
        whtml+=`<div class="avatar-slot"><div class="avatar-circle filled${staff.indexOf(s)===selected?' selected':''}" style="border-color:var(--orange)" data-widx="${staff.indexOf(s)}">${s.emoji}</div><span class="label">${s.name}</span></div>`;
      }else{
        whtml+=`<div class="avatar-slot"><div class="avatar-circle">+</div><span class="label">—</span></div>`;
      }
    }
    $('#workingGrid').innerHTML=whtml;

    // Roster scroll
    let rhtml='';
    staff.forEach((s,i)=>{
      rhtml+=`<div class="avatar-slot"><div class="avatar-circle filled${i===selected?' selected':''}" data-ridx="${i}">${s.emoji}</div><span class="label">${s.name}</span></div>`;
    });
    $('#rosterScroll').innerHTML=rhtml;
    $('#rosterCount').textContent='Possiedi: '+staff.length+'/12';

    // Detail
    const s=staff[selected];
    $('#detailAvatar').textContent=s.emoji;
    $('#detailName').textContent=s.name;
    $('#detailStats').innerHTML=[
      ['Velocità',s.speed],['Abilità',s.skill],['Fortuna',s.luck]
    ].map(([name,val])=>`<div class="stat-row"><span>${name}</span><div class="progress"><div class="${barClass(val)}" style="width:${val}%"></div></div><span>${val}</span></div>`).join('');
    $('#staffDetail').classList.toggle('active',s.working);

    // Click handlers
    document.querySelectorAll('[data-ridx],[data-widx]').forEach(el=>{
      el.addEventListener('click',()=>{
        selected=+(el.dataset.ridx??el.dataset.widx);render();
      });
    });

    // Working avatar toggle on double click
    document.querySelectorAll('[data-ridx]').forEach(el=>{
      el.addEventListener('dblclick',()=>{
        const s=staff[+el.dataset.ridx];
        s.working=!s.working;
        toast(s.working?'👨‍🍳 '+s.name+' assegnato al lavoro!':'🛑 '+s.name+' messo a riposo');
        render();
      });
    });
  }

  // Start shift
  $('#startBtn').addEventListener('click',()=>{
    if(running){toast('⏳ Turno già in corso!');return}
    const working=staff.filter(s=>s.working);
    if(!working.length){toast('👥 Assegna almeno un chef!');return}
    running=true;
    const btn=$('#startBtn');
    btn.textContent='⏳ Turno in corso...';btn.classList.add('running');
    toast('🏃 Turno avviato con '+working.length+' chef!');

    // Simulate shift
    setTimeout(()=>{
      running=false;
      // Improve random stats
      working.forEach(s=>{
        const stat=['speed','skill','luck'][Math.floor(Math.random()*3)];
        s[stat]=Math.min(100,s[stat]+Math.floor(Math.random()*5)+1);
      });
      btn.textContent='▶️ Avvia Turno';btn.classList.remove('running');
      toast('✅ Turno completato! Gli chef sono migliorati! 📈');
      render();
    },5000);
  });

  render();
})();
</script>
</body>
</html>
