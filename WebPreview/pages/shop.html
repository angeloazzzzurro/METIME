<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>METIME – Store</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      font-family: "Avenir Next", "SF Pro Rounded", "Trebuchet MS", sans-serif;
      background: #c0a8e0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 14px 0 32px;
    }

    .phone {
      width: min(390px, 96vw);
      min-height: calc(100dvh - 28px);
      background: linear-gradient(180deg, #f0e8ff 0%, #e4d8ff 100%);
      border-radius: 52px;
      border: 2px solid rgba(255,255,255,0.5);
      box-shadow: 0 32px 72px rgba(100,60,180,0.3), inset 0 2px 0 rgba(255,255,255,0.85);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .notch {
      width: 36%; height: 28px;
      background: #1a0f2e;
      border-radius: 0 0 18px 18px;
      margin: 0 auto;
      flex-shrink: 0;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 0;
    }
    .gem-btn {
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      color: white;
      border: none;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
    }
    .store-title {
      font-size: 18px;
      font-weight: 900;
      color: #2d1855;
    }
    .close-link {
      font-size: 13px;
      font-weight: 600;
      color: #6b5a8e;
      cursor: pointer;
      text-decoration: none;
    }

    /* Currency row */
    .currency-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      padding: 10px 0;
    }
    .currency-pill {
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 14px;
      font-weight: 800;
    }
    .pill-coins {
      background: #fbbf24;
      color: #78350f;
    }
    .pill-gems {
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      color: white;
    }

    /* Category tabs */
    .category-tabs {
      display: flex;
      gap: 8px;
      padding: 0 14px 12px;
      overflow-x: auto;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      border: none;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: transform 0.1s;
    }
    .cat-tab:active { transform: scale(0.96); }
    .cat-tab.active {
      background: #a78bfa;
      color: white;
    }
    .cat-tab:not(.active) {
      background: rgba(200,180,240,0.3);
      color: #6b5a8e;
    }

    /* Items grid */
    .items-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 14px 20px;
      overflow-y: auto;
      flex: 1;
    }

    /* Item card */
    .item-card {
      background: white;
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 4px 16px rgba(140,80,200,0.1);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .item-name {
      font-size: 15px;
      font-weight: 800;
      color: #1a0a30;
      margin-bottom: 2px;
    }
    .item-emoji {
      font-size: 48px;
      text-align: center;
      display: block;
      margin: 8px 0;
    }
    .item-desc {
      font-size: 11px;
      color: #888;
      margin-bottom: 8px;
      flex: 1;
    }
    .stat-badge {
      display: inline-block;
      background: rgba(220,250,220,0.8);
      color: #16a34a;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }
    .item-price {
      font-size: 13px;
      font-weight: 800;
      color: #1a0a30;
    }
    .buy-btn {
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      color: white;
      border: none;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.1s;
    }
    .buy-btn:active { transform: scale(0.95); }

    /* Rare badge */
    .rare-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #a78bfa;
      color: white;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 800;
      padding: 2px 6px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30,15,60,0.85);
      color: white;
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 12px;
      font-weight: 700;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
      white-space: nowrap;
      z-index: 99;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>

  <div class="header">
    <button class="gem-btn">💎 Acquista Gemme</button>
    <span class="store-title">🛍 Store</span>
    <a class="close-link" href="../index.html">Chiudi</a>
  </div>

  <div class="currency-row">
    <span class="currency-pill pill-coins">🪙 100</span>
    <span class="currency-pill pill-gems">💎 5</span>
  </div>

  <div class="category-tabs">
    <button class="cat-tab active" onclick="selectCat(this)">Cibo</button>
    <button class="cat-tab" onclick="selectCat(this)">Essenziali</button>
    <button class="cat-tab" onclick="selectCat(this)">Decorazioni</button>
    <button class="cat-tab" onclick="selectCat(this)">Speciali</button>
  </div>

  <div class="items-grid">
    <!-- Carota -->
    <div class="item-card">
      <span class="item-name">Carota</span>
      <span class="item-emoji">🥕</span>
      <span class="item-desc">Un gustoso spuntino salutare.</span>
      <span class="stat-badge">+30% 🍖</span>
      <div class="price-row">
        <span class="item-price">🪙 15</span>
        <button class="buy-btn" onclick="buy(this, 15)">Acquista</button>
      </div>
    </div>

    <!-- Biscotto -->
    <div class="item-card">
      <span class="item-name">Biscotto</span>
      <span class="item-emoji">🍪</span>
      <span class="item-desc">Perfetto per una pausa dolce.</span>
      <span class="stat-badge">+20% 😊</span>
      <div class="price-row">
        <span class="item-price">🪙 25</span>
        <button class="buy-btn" onclick="buy(this, 25)">Acquista</button>
      </div>
    </div>

    <!-- Torta -->
    <div class="item-card">
      <span class="rare-badge">Raro</span>
      <span class="item-name">Torta</span>
      <span class="item-emoji">🎂</span>
      <span class="item-desc">Una festa per il palato!</span>
      <span class="stat-badge">+40% 🍖 +30% 😊</span>
      <div class="price-row">
        <span class="item-price">🪙 60</span>
        <button class="buy-btn" onclick="buy(this, 60)">Acquista</button>
      </div>
    </div>

    <!-- Tè -->
    <div class="item-card">
      <span class="item-name">Tè</span>
      <span class="item-emoji">🍵</span>
      <span class="item-desc">Rilassante e rigenerante.</span>
      <span class="stat-badge">+25% 🌿</span>
      <div class="price-row">
        <span class="item-price">🪙 30</span>
        <button class="buy-btn" onclick="buy(this, 30)">Acquista</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  function selectCat(el) {
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }

  function buy(btn, price) {
    const t = document.getElementById('toast');
    t.textContent = 'Acquistato! -' + price + ' 🪙';
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 1800);
  }
</script>
</body>
</html>
