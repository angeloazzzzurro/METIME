name: iOS Build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "docs/**"
      - "WebPreview/**"
      - "*.md"
  pull_request:
    branches: [ main ]
    paths-ignore:
      - "docs/**"
      - "WebPreview/**"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build iOS App (${{ matrix.destination_name }})
    runs-on: macos-15
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - destination_name: iOS Simulator
            sdk: iphonesimulator
            destination: "generic/platform=iOS Simulator"
          - destination_name: iOS Device
            sdk: iphoneos
            destination: "generic/platform=iOS"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Generate project
        run: xcodegen generate

      - name: Lint
        run: swiftlint

      - name: List available simulators
        run: xcrun simctl list devices

      - name: Show available build destinations
        run: xcodebuild -showdestinations -project METIME.xcodeproj -scheme METIME

      - name: Build for ${{ matrix.destination_name }}
        run: |
          xcodebuild \
            -project METIME.xcodeproj \
            -scheme METIME \
            -sdk ${{ matrix.sdk }} \
            -destination '${{ matrix.destination }}' \
            CODE_SIGNING_ALLOWED=NO \
            build
