name: iOS Build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "docs/**"
      - "WebPreview/**"
      - "*.md"
  pull_request:
    branches: [ main ]
    paths-ignore:
      - "docs/**"
      - "WebPreview/**"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Generate project
        run: xcodegen generate

      - name: Lint
        run: swiftlint

      - name: List available simulators
        run: xcrun simctl list devices

      - name: Show available build destinations
        run: xcodebuild -showdestinations -project METIME.xcodeproj -scheme METIME

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project METIME.xcodeproj \
            -scheme METIME \
            -destination 'platform=iOS Simulator,name=iPhone SE (3rd generation),OS=16.4' \
            CODE_SIGNING_ALLOWED=NO \
            build
