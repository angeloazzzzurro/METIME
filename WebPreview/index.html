<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>METIME</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      font-family: "Avenir Next", "SF Pro Rounded", "Trebuchet MS", sans-serif;
      background: linear-gradient(160deg, #f8c0e0 0%, #e8c8f8 50%, #c8c0f8 100%);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 14px 0 32px;
    }

    .phone {
      width: min(390px, 96vw);
      min-height: calc(100dvh - 28px);
      background: radial-gradient(ellipse 110% 55% at 50% 0%, #fcc8e0 0%, #f4c8f4 40%, #d4c0ff 80%, #c4b8f8 100%);
      border-radius: 52px;
      border: 2px solid rgba(255,255,255,0.5);
      box-shadow: 0 32px 72px rgba(140,80,180,0.28), inset 0 2px 0 rgba(255,255,255,0.85);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .notch {
      width: 36%; height: 28px;
      background: #1a0f2e;
      border-radius: 0 0 18px 18px;
      margin: 0 auto;
      flex-shrink: 0;
    }

    /* Title */
    .main-title {
      font-size: 64px;
      font-weight: 900;
      color: #2d1855;
      text-align: center;
      margin-top: 16px;
      line-height: 1;
    }

    /* Mood badge */
    .mood-badge {
      display: block;
      width: fit-content;
      margin: 10px auto 0;
      background: rgba(255,255,255,0.85);
      border-radius: 999px;
      padding: 7px 20px;
      font-size: 15px;
      font-weight: 700;
      color: #4a3470;
    }

    /* World wrap */
    .world-wrap {
      display: flex;
      justify-content: center;
      padding: 8px 0 0;
    }
    .world-svg {
      width: 100%;
      max-width: 360px;
      overflow: visible;
    }

    /* Pet bounce */
    @keyframes petBounce {
      0%,100% { transform: translateY(0); }
      45%     { transform: translateY(-8px); }
    }
    .pet-group { animation: petBounce 2.2s ease-in-out infinite; }

    /* Sparkle */
    @keyframes spkAnim {
      0%,100% { opacity: 0; }
      50%     { opacity: 1; }
    }

    /* Color picker */
    .color-picker-section {
      margin: 6px 14px 0;
    }
    .picker-label {
      font-size: 11px;
      color: rgba(80,40,120,0.7);
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
    }
    .picker-row {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .color-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid rgba(200,180,255,0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #8b5cf6;
      flex-shrink: 0;
      transition: transform 0.12s;
    }
    .color-dot:active { transform: scale(0.9); }
    .color-dot.selected {
      border: 2.5px solid #8b5cf6;
    }

    /* 4 pill buttons */
    .pill-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 10px 14px 20px;
    }
    .pill-btn {
      border-radius: 999px;
      padding: 16px 20px;
      font-size: 17px;
      font-weight: 800;
      color: white;
      text-align: center;
      cursor: pointer;
      border: none;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.3);
      font-family: inherit;
      transition: transform 0.12s;
    }
    .pill-btn:active { transform: scale(0.96); }
    .pill-hunger  { background: linear-gradient(135deg, #6b8ff8, #4f6ef0); }
    .pill-happy   { background: linear-gradient(135deg, #f87171, #ef4444); }
    .pill-calm    { background: linear-gradient(135deg, #93c5fd, #60a5fa); }
    .pill-energy  { background: linear-gradient(135deg, #34d399, #10b981); }

    /* Toast */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(30,15,60,0.85); color: #fff;
      border-radius: 999px; padding: 8px 18px;
      font-size: 12px; font-weight: 700;
      pointer-events: none; opacity: 0;
      transition: opacity 0.25s;
      white-space: nowrap; z-index: 99;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>

  <div class="main-title">Me</div>
  <span class="mood-badge" id="moodBadge">Calm 🌿</span>

  <!-- ISOMETRIC WORLD SVG -->
  <div class="world-wrap">
    <svg class="world-svg" viewBox="0 0 340 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="petBodyG" cx="36%" cy="30%" r="68%">
          <stop offset="0%"  stop-color="#f0e8ff"/>
          <stop offset="60%" stop-color="#c4a8f8"/>
          <stop offset="100%" stop-color="#9060d8"/>
        </radialGradient>
        <radialGradient id="petHaloG" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#c4a8f8" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#c4a8f8" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="shadowG" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="rgba(80,20,140,0.18)"/>
          <stop offset="100%" stop-color="rgba(80,20,140,0)"/>
        </radialGradient>
      </defs>

      <!-- ===== TILES painter's order (c+r ascending) ===== -->

      <!-- c+r=0: (0,0) cx=170 cy=58 light -->
      <g>
        <polygon points="170,39 208,58 170,77 132,58" fill="#90d870" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
        <polygon points="132,58 170,77 170,86 132,67" fill="#5aaa38"/>
        <polygon points="208,58 170,77 170,86 208,67" fill="#4a9828"/>
      </g>

      <!-- c+r=1: (1,0) cx=208 cy=77 dark, (0,1) cx=132 cy=77 dark -->
      <g>
        <polygon points="208,58 246,77 208,96 170,77" fill="#78c258" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
        <polygon points="170,77 208,96 208,105 170,86" fill="#50a030"/>
        <polygon points="246,77 208,96 208,105 246,86" fill="#408820"/>
      </g>
      <g>
        <polygon points="132,58 170,77 132,96 94,77" fill="#78c258" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
        <polygon points="94,77 132,96 132,105 94,86" fill="#50a030"/>
        <polygon points="170,77 132,96 132,105 170,86" fill="#408820"/>
      </g>

      <!-- c+r=2: (2,0) cx=246 cy=96 light, (1,1) cx=170 cy=96 light, (0,2) cx=94 cy=96 light -->

        <polygon points="246,77 284,96 246,115 208,96" fill="#90d870" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
        <polygon points="208,96 246,115 246,124 208,105" fill="#5aaa38"/>
        <polygon points="284,96 246,115 246,124 284,105" fill="#4a9828"/>
      </g>
      <g>
        <polygon points="170,77 208,96 170,115 132,96" fill="#90d870" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
        <polygon points="132,96 170,115 170,124 132,105" fill="#5aaa38"/>
        <polygon points="208,96 170,115 170,124 208,105" fill="#4a9828"/>
      </g>
      <g>
        <polygon points="94,77 132,96 94,115 56,96" fill="#90d870" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
        <polygon points="56,96 94,115 94,124 56,105" fill="#5aaa38"/>
        <polygon points="132,96 94,115 94,124 132,105" fill="#4a9828"/>
      </g>

      <!-- c+r=3: (3,0) cx=284 cy=115 dark, (2,1) cx=208 cy=115 dark, (1,2) cx=132 cy=115 dark, (0,3) cx=56 cy=115 dark -->
      <g>
        <polygon points="284,96 322,115 284,134 246,115" fill="#78c258" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
        <polygon points="246,115 284,134 284,143 246,124" fill="#50a030"/>
        <polygon points="322,115 284,134 284,143 322,124" fill="#408820"/>
      </g>
      <g>
        <polygon points="208,96 246,115 208,134 170,115" fill="#78c258" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
        <polygon points="170,115 208,134 208,143 170,124" fill="#50a030"/>
        <polygon points="246,115 208,134 208,143 246,124" fill="#408820"/>
      </g>
      <g>
        <polygon points="132,96 170,115 132,134 94,115" fill="#78c258" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
        <polygon points="94,115 132,134 132,143 94,124" fill="#50a030"/>
        <polygon points="170,115 132,134 132,143 170,124" fill="#408820"/>
      </g>
      <g>
        <polygon points="56,96 94,115 56,134 18,115" fill="#78c258" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
        <polygon points="18,115 56,134 56,143 18,124" fill="#50a030"/>
        <polygon points="94,115 56,134 56,143 94,124" fill="#408820"/>
      </g>

      <!-- c+r=4: (3,1) cx=246 cy=134 light, (2,2) cx=170 cy=134 light PET TILE, (1,3) cx=94 cy=134 light -->
      <g>
        <polygon points="246,115 284,134 246,153 208,134" fill="#90d870" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
        <polygon points="208,134 246,153 246,162 208,143" fill="#5aaa38"/>
        <polygon points="284,134 246,153 246,162 284,143" fill="#4a9828"/>
      </g>
      <g>
        <!-- PET TILE (2,2) cx=170 cy=134 -->
        <polygon points="170,115 208,134 170,153 132,134" fill="#90d870" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
        <!-- Rug under pet -->
        <ellipse cx="170" cy="142" rx="20" ry="8" fill="rgba(200,160,240,0.15)"/>
        <polygon points="132,134 170,153 170,162 132,143" fill="#5aaa38"/>
        <polygon points="208,134 170,153 170,162 208,143" fill="#4a9828"/>
      </g>
      <g>
        <polygon points="94,115 132,134 94,153 56,134" fill="#90d870" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
        <polygon points="56,134 94,153 94,162 56,143" fill="#5aaa38"/>
        <polygon points="132,134 94,153 94,162 132,143" fill="#4a9828"/>
      </g>

      <!-- c+r=5: (3,2) cx=208 cy=153 dark, (2,3) cx=132 cy=153 dark -->
      <g>
        <polygon points="208,134 246,153 208,172 170,153" fill="#78c258" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
        <polygon points="170,153 208,172 208,181 170,162" fill="#50a030"/>
        <polygon points="246,153 208,172 208,181 246,162" fill="#408820"/>
      </g>
      <g>
        <polygon points="132,134 170,153 132,172 94,153" fill="#78c258" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
        <polygon points="94,153 132,172 132,181 94,162" fill="#50a030"/>
        <polygon points="170,153 132,172 132,181 170,162" fill="#408820"/>
      </g>

      <!-- c+r=6: (3,3) cx=170 cy=172 light -->
      <g>
        <polygon points="170,153 208,172 170,191 132,172" fill="#90d870" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
        <polygon points="132,172 170,191 170,200 132,181" fill="#5aaa38"/>
        <polygon points="208,172 170,191 170,200 208,181" fill="#4a9828"/>
      </g>

      <!-- ===== FLOWERS ===== -->
      <!-- 1: translate(110,100) -->
      <g transform="translate(110,100)">
        <line x1="0" y1="0" x2="0" y2="8" stroke="#5aaa30" stroke-width="1.5"/>
        <circle cx="0" cy="-3" r="5" fill="#f87171"/>
        <circle cx="0" cy="-3" r="2.5" fill="rgba(255,255,255,0.3)"/>
      </g>
      <!-- 2: translate(155,112) -->
      <g transform="translate(155,112)">
        <line x1="0" y1="0" x2="0" y2="8" stroke="#5aaa30" stroke-width="1.5"/>
        <circle cx="0" cy="-3" r="5" fill="#f9a8d4"/>
        <circle cx="0" cy="-3" r="2.5" fill="rgba(255,255,255,0.3)"/>
      </g>
      <!-- 3: translate(198,118) -->
      <g transform="translate(198,118)">
        <line x1="0" y1="0" x2="0" y2="8" stroke="#5aaa30" stroke-width="1.5"/>
        <circle cx="0" cy="-3" r="5" fill="#a78bfa"/>
        <circle cx="0" cy="-3" r="2.5" fill="rgba(255,255,255,0.3)"/>
      </g>
      <!-- 4: translate(140,128) -->
      <g transform="translate(140,128)">
        <line x1="0" y1="0" x2="0" y2="8" stroke="#5aaa30" stroke-width="1.5"/>
        <circle cx="0" cy="-3" r="5" fill="#fcd34d"/>
        <circle cx="0" cy="-3" r="2.5" fill="rgba(255,255,255,0.3)"/>
      </g>
      <!-- 5: translate(220,136) -->
      <g transform="translate(220,136)">
        <line x1="0" y1="0" x2="0" y2="8" stroke="#5aaa30" stroke-width="1.5"/>
        <circle cx="0" cy="-3" r="5" fill="#f87171"/>
        <circle cx="0" cy="-3" r="2.5" fill="rgba(255,255,255,0.3)"/>
      </g>
      <!-- 6: translate(88,118) -->
      <g transform="translate(88,118)">
        <line x1="0" y1="0" x2="0" y2="8" stroke="#5aaa30" stroke-width="1.5"/>
        <circle cx="0" cy="-3" r="5" fill="#f9a8d4"/>
        <circle cx="0" cy="-3" r="2.5" fill="rgba(255,255,255,0.3)"/>
      </g>

      <!-- ===== TREE LEFT translate(44,80) ===== -->
      <g transform="translate(44,80)">
        <ellipse cx="0" cy="40" rx="18" ry="6" fill="rgba(60,20,100,0.16)"/>
        <rect x="-6" y="24" width="12" height="20" rx="4" fill="#8b5e34"/>
        <circle cx="0" cy="10" r="26" fill="#42aa20"/>
        <circle cx="-9" cy="2" r="18" fill="#54c030" opacity="0.8"/>
        <circle cx="4" cy="-6" r="14" fill="#6ed848" opacity="0.7"/>
        <circle cx="-7" cy="-10" r="8" fill="#88f060" opacity="0.45"/>
      </g>

      <!-- ===== TREE RIGHT translate(296,85) ===== -->
      <g transform="translate(296,85)">
        <ellipse cx="0" cy="34" rx="14" ry="5" fill="rgba(60,20,100,0.16)"/>
        <rect x="-5" y="20" width="10" height="16" rx="3" fill="#8b5e34"/>
        <circle cx="0" cy="8" r="22" fill="#42aa20"/>
        <circle cx="-7" cy="1" r="15" fill="#54c030" opacity="0.8"/>
        <circle cx="3" cy="-5" r="12" fill="#6ed848" opacity="0.7"/>
        <circle cx="-6" cy="-8" r="6" fill="#88f060" opacity="0.45"/>
      </g>

      <!-- ===== PET BLOB (tile 2,2) cx=170 cy=125 ===== -->
      <!-- Shadow -->
      <ellipse cx="170" cy="140" rx="28" ry="8" fill="rgba(80,20,140,0.18)"/>

      <g class="pet-group">
        <!-- Halo -->
        <circle cx="170" cy="120" r="40" fill="url(#petHaloG)"/>
        <!-- Ears -->
        <ellipse cx="152" cy="94" rx="8" ry="10" fill="#c0a0f0" stroke="rgba(200,180,240,0.35)" stroke-width="1.5"/>
        <ellipse cx="188" cy="94" rx="8" ry="10" fill="#c0a0f0" stroke="rgba(200,180,240,0.35)" stroke-width="1.5"/>
        <!-- Inner ear -->
        <ellipse cx="152" cy="95" rx="4" ry="5.5" fill="white" opacity="0.5"/>
        <ellipse cx="188" cy="95" rx="4" ry="5.5" fill="white" opacity="0.5"/>
        <!-- Body -->
        <circle cx="170" cy="120" r="32" fill="url(#petBodyG)" stroke="rgba(200,180,240,0.4)" stroke-width="2"/>
        <!-- Highlight -->
        <ellipse cx="162" cy="110" rx="10" ry="8" fill="white" opacity="0.3"/>
        <!-- Eyes -->
        <ellipse cx="162" cy="115" rx="5.5" ry="7" fill="#2a1f4e"/>
        <ellipse cx="178" cy="115" rx="5.5" ry="7" fill="#2a1f4e"/>
        <!-- Eye shine -->
        <circle cx="164" cy="111" r="2.5" fill="white" opacity="0.9"/>
        <circle cx="180" cy="111" r="2.5" fill="white" opacity="0.9"/>

        <path d="M 161 123 Q 170 131 179 123" stroke="#2a1f4e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Blush -->
        <ellipse cx="150" cy="120" rx="9" ry="5" fill="#f9a8d4" opacity="0.7"/>
        <ellipse cx="190" cy="120" rx="9" ry="5" fill="#f9a8d4" opacity="0.7"/>

      <!-- Sparkles around pet -->
      <text x="128" y="92" font-size="11" fill="#d4a0ff" text-anchor="middle">
        ✦<animate attributeName="opacity" values="0;1;0" dur="2.1s" begin="0s" repeatCount="indefinite"/>
      </text>
      <text x="214" y="88" font-size="10" fill="#d4a0ff" text-anchor="middle">
        ✦<animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
      </text>
      <text x="122" y="120" font-size="12" fill="#d4a0ff" text-anchor="middle">
        ✦<animate attributeName="opacity" values="0;1;0" dur="1.9s" begin="1.2s" repeatCount="indefinite"/>
      </text>
      <text x="220" y="118" font-size="10" fill="#d4a0ff" text-anchor="middle">
        ✦<animate attributeName="opacity" values="0;1;0" dur="2.7s" begin="0.3s" repeatCount="indefinite"/>
      </text>

    </svg>
  </div>

  <!-- COLOR PICKER -->
  <div class="color-picker-section">
    <div class="picker-label">✦ Tocca Me per cambiare colore</div>
    <div class="picker-row">
      <div class="color-dot" style="background:#f0ead8" onclick="selectColor(this)"></div>
      <div class="color-dot selected" style="background:#e8d8b8" onclick="selectColor(this)">✓</div>
      <div class="color-dot" style="background:#f97316" onclick="selectColor(this)"></div>
      <div class="color-dot" style="background:#34d399" onclick="selectColor(this)"></div>
      <div class="color-dot" style="background:#06b6d4" onclick="selectColor(this)"></div>
      <div class="color-dot" style="background:#ef4444" onclick="selectColor(this)"></div>
      <div class="color-dot" style="background:#fbbf24" onclick="selectColor(this)"></div>
      <div class="color-dot" style="background:#f8fafc; border-color:rgba(200,180,255,0.6)" onclick="selectColor(this)"></div>
    </div>
  </div>

  <!-- 4 PILL BUTTONS 2x2 -->
  <div class="pill-grid">
    <button class="pill-btn pill-hunger" onclick="boost('hunger',15)">🍖 Hunger</button>
    <button class="pill-btn pill-happy"  onclick="boost('happiness',15)">😊 Happiness</button>
    <button class="pill-btn pill-calm"   onclick="boost('calm',15)">🌿 Calm</button>
    <button class="pill-btn pill-energy" onclick="boost('energy',15)">⚡ Energy</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const state = { hunger: 65, happiness: 80, calm: 70, energy: 90 };

  const moods = [
    [88, 'Felice 🌸'],
    [70, 'Calm 🌿'],
    [50, 'Stanco 😴'],
    [0,  'Triste 🌧']
  ];

  function boost(stat, amount) {
    state[stat] = Math.min(100, state[stat] + amount);
    const avg = Object.values(state).reduce((a,b)=>a+b,0) / 4;
    const mood = moods.find(([t]) => avg >= t)[1];
    document.getElementById('moodBadge').textContent = mood;
    showToast('Boost ' + stat + '! +' + amount);
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 1800);
  }

  function selectColor(el) {
    document.querySelectorAll('.color-dot').forEach(d => {
      d.classList.remove('selected');
      d.textContent = '';
    });
    el.classList.add('selected');
    el.textContent = '✓';
  }

  setInterval(() => {
    Object.keys(state).forEach(k => {
      state[k] = Math.max(0, state[k] - 1);
    });
    const avg = Object.values(state).reduce((a,b)=>a+b,0) / 4;
    const mood = moods.find(([t]) => avg >= t)[1];
    document.getElementById('moodBadge').textContent = mood;
  }, 30000);
</script>
</body>
</html>
