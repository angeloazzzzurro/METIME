<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>METIME — Mercato</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/game.css"/>
  <style>
    .vendor-area{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px}
    .vendor-char{flex-shrink:0;cursor:pointer;transition:transform .2s var(--spring)}
    .vendor-char:hover{transform:scale(1.08) rotate(-3deg)}
    .vendor-info{flex:1}
    .vendor-info h3{margin:0 0 4px;font-size:16px;font-weight:900;color:var(--ink)}
    .vendor-info p{margin:0;font-size:12px;color:var(--ink-lt);line-height:1.4}
    .restock-card{min-width:110px;border-radius:var(--radius);border:2.5px solid var(--border-lt);background:var(--panel);overflow:hidden;flex-shrink:0;transition:transform .2s var(--spring),box-shadow .2s;cursor:pointer}
    .restock-card:hover{transform:translateY(-3px) scale(1.03);box-shadow:var(--shadow-md),var(--inner-glow)}
    .restock-card:active{transform:scale(.96);transition-duration:.06s}
    .restock-card.sold .r-thumb::after{content:'ESAURITO';position:absolute;inset:0;display:grid;place-items:center;font-size:10px;font-weight:900;color:#fff;background:rgba(0,0,0,.5);border-radius:inherit}
    .restock-card .r-thumb{aspect-ratio:1;background:linear-gradient(135deg,#f0e8d4,#e8dcc4);display:grid;place-items:center;font-size:32px;border-bottom:2px solid var(--border-lt);position:relative}
    .restock-card .r-info{padding:8px;text-align:center}
    .restock-card .r-timer{display:block;font-size:10px;font-weight:700;color:var(--ink-lt);margin-bottom:4px}
    .restock-card .r-price{font-size:12px;font-weight:800;color:var(--ink)}
    .buy-slot{margin-top:14px}
    .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.6);background:linear-gradient(180deg,rgba(253,243,227,.98),rgba(245,234,216,.98));border:3px solid var(--border);border-radius:var(--radius-lg);padding:18px 30px;text-align:center;box-shadow:0 12px 48px rgba(61,43,31,.35),var(--inner-glow);z-index:200;opacity:0;pointer-events:none;transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .2s;backdrop-filter:blur(12px);font-size:13px;font-weight:800;color:var(--ink)}
    .toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
    .coins-hud{text-align:right;font-size:15px;font-weight:900;margin-bottom:6px;font-variant-numeric:tabular-nums;transition:transform .2s var(--spring)}
    .coins-hud.bump{animation:coinBump .45s var(--spring)}
    @keyframes coinBump{0%{transform:scale(1)}35%{transform:scale(1.2) translateY(-2px)}100%{transform:scale(1)}}
    .npc-speech{font-style:italic;transition:opacity .3s}
  </style>
</head>
<body>
<div class="toast" id="toast"></div>
<main class="phone">
  <div class="screen">

    <div class="page-hdr">
      <h1 class="page-title">Mercato</h1>
      <button class="close-btn" onclick="history.back()">✕</button>
    </div>

    <div class="coins-hud">🪙 <span id="coins">8000</span></div>

    <div class="panel panel--wood panel--fancy floral">

      <div class="vendor-area">
        <div class="vendor-char" id="vendorNpc">
          <div class="char-illust" style="width:90px;min-height:100px;font-size:44px">🦝</div>
        </div>
        <div class="vendor-info">
          <h3>Mercato Tanuki</h3>
          <p class="npc-speech" id="npcSpeech">"Benvenuto, benvenuto! Ingredienti freschi appena arrivati dalla campagna. Dai un'occhiata!"</p>
          <div class="mt-8 flex items-center gap-6">
            <span class="text-xs font-bold" style="color:var(--ink-lt)">Nuova offerta tra</span>
            <span class="timer" id="offerTimer">⏱ 05h 12m</span>
          </div>
        </div>
      </div>

      <span class="section-label">Scorte di Oggi</span>
      <div class="h-scroll" id="stockScroll"></div>

      <div class="buy-slot">
        <button class="btn btn--green w-full" id="buySlotBtn">➕ Compra Nuovo Slot — 🪙 500</button>
      </div>

    </div>
  </div>

  <nav class="tab-bar">
    <a class="tab-link" href="../gallery.html"><span class="tab-icon">🎮</span>Galleria</a>
    <a class="tab-link" href="hub.html"><span class="tab-icon">🏠</span>Casa</a>
    <a class="tab-link" href="shop.html"><span class="tab-icon">🛒</span>Negozio</a>
    <a class="tab-link" href="map.html"><span class="tab-icon">🗺️</span>Mappa</a>
    <a class="tab-link" href="../index.html"><span class="tab-icon">🐰</span>Pet</a>
  </nav>
</main>

<script>
(function(){
  const stock=[
    {emoji:'🥚',name:'Uova',price:120,restockSec:8,sold:false},
    {emoji:'🧈',name:'Burro',price:200,restockSec:12,sold:false},
    {emoji:'🍯',name:'Miele',price:350,restockSec:6,sold:false},
    {emoji:'🌶️',name:'Peperoncini',price:80,restockSec:15,sold:false},
    {emoji:'🫐',name:'Mirtilli',price:150,restockSec:0,sold:false},
  ];

  const speeches=[
    '"Ah, ottima scelta! Fresco di giornata!"',
    '"Questo è il migliore che ho! Da veri chef!"',
    '"Prendilo prima che finisca, eh!"',
    '"Grazie per l\'acquisto! Torna presto!"',
    '"Benvenuto! Oggi ho qualcosa di speciale..."',
  ];

  let coins=8000,slots=5;
  const $=s=>document.querySelector(s);
  const toast=m=>{const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)};

  function render(){
    $('#coins').textContent=coins.toLocaleString('it-IT');
    $('#stockScroll').innerHTML=stock.map((item,i)=>{
      const ready=item.restockSec<=0&&!item.sold;
      const restocking=item.restockSec>0&&item.sold;
      let timerText=ready?'Disponibile!':item.sold?`Riforni tra ${item.restockSec}s`:'In vendita';
      let timerStyle=ready?'border:0;background:transparent;padding:0;color:#5a8a42':'';
      return `<div class="restock-card${item.sold&&!restocking?' sold':''}" data-idx="${i}">
        <div class="r-thumb">${item.emoji}</div>
        <div class="r-info">
          <span class="r-timer${ready?' timer':''}" style="${timerStyle}" id="timer-${i}">${timerText}</span>
          <span class="r-price">🪙 ${item.price}</span>
          <button class="btn btn--primary btn--sm w-full" style="margin-top:4px;font-size:10px" data-buy="${i}" ${item.sold?'disabled':''}>${item.sold?'Esaurito':'Compra'}</button>
        </div>
      </div>`;
    }).join('');

    document.querySelectorAll('[data-buy]').forEach(btn=>{
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        const idx=+btn.dataset.buy;
        const item=stock[idx];
        if(item.sold)return;
        if(coins<item.price){toast('🪙 Monete insufficienti!');return}
        coins-=item.price;item.sold=true;
        item.restockSec=Math.floor(Math.random()*10)+8;
        toast('🛒 '+item.name+' acquistato!');
        $('#npcSpeech').textContent=speeches[Math.floor(Math.random()*speeches.length)];
        render();
      });
    });
  }

  // Restock timers
  setInterval(()=>{
    let changed=false;
    stock.forEach(item=>{
      if(item.sold&&item.restockSec>0){
        item.restockSec--;
        if(item.restockSec<=0){item.sold=false;changed=true;toast('📦 '+item.name+' rifornito!');}
      }
    });
    // Update timer displays
    stock.forEach((item,i)=>{
      const el=document.getElementById('timer-'+i);
      if(!el)return;
      if(!item.sold)el.textContent='In vendita';
      else if(item.restockSec>0)el.textContent='Riforni tra '+item.restockSec+'s';
    });
    if(changed)render();
  },1000);

  // Global offer timer
  let offerSec=5*3600+12*60;
  setInterval(()=>{
    offerSec=Math.max(0,offerSec-10);
    const h=Math.floor(offerSec/3600);const m=Math.floor((offerSec%3600)/60);
    $('#offerTimer').textContent=`⏱ ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m`;
  },10000);

  // Vendor NPC click
  $('#vendorNpc').addEventListener('click',()=>{
    $('#npcSpeech').textContent=speeches[Math.floor(Math.random()*speeches.length)];
  });

  // Buy slot
  $('#buySlotBtn').addEventListener('click',()=>{
    if(coins<500){toast('🪙 Servono 500 monete!');return}
    coins-=500;slots++;
    const newItems=[
      {emoji:'🧄',name:'Aglio',price:60},{emoji:'🍋',name:'Limoni',price:90},
      {emoji:'🥒',name:'Cetrioli',price:70},{emoji:'🍖',name:'Carne',price:250}
    ];
    const ni=newItems[Math.floor(Math.random()*newItems.length)];
    stock.push({...ni,restockSec:0,sold:false});
    toast('➕ Nuovo slot sbloccato: '+ni.name+'!');
    render();
  });

  render();
})();
</script>
</body>
</html>
