name: METIME
options:
  bundleIdPrefix: com.metime
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""

targets:
  METIME:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    bundleId: com.metime.app
    sources:
      - path: App
      - path: Audio
      - path: Creature
      - path: Garden
      - path: Data
      - path: UI
      - path: Resources
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metime.app
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: METIME.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
