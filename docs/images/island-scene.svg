<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="METIME island scene">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c7e3ff"/>
      <stop offset="100%" stop-color="#e8f7ea"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7cc9ff"/>
      <stop offset="100%" stop-color="#4ca8ea"/>
    </linearGradient>
    <radialGradient id="island" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#8fdf7f"/>
      <stop offset="100%" stop-color="#4dac45"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#3a6a3a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="url(#sky)"/>
  <rect y="560" width="1200" height="200" fill="url(#sea)"/>

  <ellipse cx="600" cy="470" rx="420" ry="205" fill="url(#island)" filter="url(#soft)"/>

  <ellipse cx="330" cy="520" rx="120" ry="46" fill="#3b8a36" opacity="0.35"/>
  <ellipse cx="840" cy="505" rx="110" ry="42" fill="#3b8a36" opacity="0.35"/>

  <g transform="translate(590 290)">
    <polygon points="0,0 95,0 48,-55" fill="#d24a4a"/>
    <rect y="0" width="95" height="68" rx="10" fill="#f4e4c9" stroke="#cb9b62" stroke-width="4"/>
    <rect x="39" y="33" width="16" height="35" rx="4" fill="#8a5f3d"/>
    <rect x="12" y="20" width="17" height="16" rx="3" fill="#d4eeff" stroke="#cb9b62" stroke-width="3"/>
    <rect x="66" y="20" width="17" height="16" rx="3" fill="#d4eeff" stroke="#cb9b62" stroke-width="3"/>
  </g>

  <g fill="#2e7f2d">
    <circle cx="360" cy="360" r="38"/>
    <rect x="354" y="386" width="12" height="30" rx="4" fill="#7f5b3d"/>
    <circle cx="875" cy="350" r="42"/>
    <rect x="868" y="380" width="14" height="32" rx="4" fill="#7f5b3d"/>
  </g>

  <g font-family="Avenir Next, Arial, sans-serif" font-weight="800" font-size="34" text-anchor="middle">
    <text x="600" y="190" fill="#2c365f">METIME ISLAND</text>
    <text x="600" y="225" fill="#4b5b87" font-size="22">Casa · Giardino · Mare · Benessere quotidiano</text>
  </g>

  <g font-family="Avenir Next, Arial, sans-serif" font-size="20" font-weight="700" fill="#305245">
    <text x="322" y="500">Giardino</text>
    <text x="878" y="492">Negozio</text>
    <text x="628" y="434">Casa</text>
  </g>

  <g font-size="44">
    <text x="300" y="485">🌱</text>
    <text x="350" y="486">🌿</text>
    <text x="402" y="486">🌸</text>
    <text x="838" y="470">🛒</text>
    <text x="585" y="485">🥚</text>
  </g>
</svg>
