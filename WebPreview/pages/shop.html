<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>METIME — Negozio</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/game.css"/>
  <style>
    .shop-grid{gap:8px}
    .pagination{display:flex;justify-content:center;gap:6px;margin-top:14px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--border-lt);opacity:.4;cursor:pointer;transition:opacity .2s,background .2s}
    .dot.active{opacity:1;background:var(--orange)}
    .coins-hud{text-align:right;font-size:14px;font-weight:900;color:var(--ink);margin-bottom:8px}
    .item-card{transition:transform .15s;cursor:pointer}
    .item-card:hover{transform:translateY(-2px)}
    .item-card.bought .thumb::after{content:'✅';position:absolute;inset:0;display:grid;place-items:center;font-size:28px;background:rgba(255,255,255,.7);border-radius:inherit}
    .item-card .thumb{position:relative}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--panel);border:2px solid var(--border);border-radius:var(--radius);padding:10px 18px;font-size:12px;font-weight:800;color:var(--ink);box-shadow:var(--shadow-md);z-index:100;transition:transform .3s var(--ease);pointer-events:none}
    .toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div class="toast" id="toast"></div>
<main class="phone">
  <div class="screen">

    <div class="page-hdr">
      <h1 class="page-title">Negozio</h1>
      <button class="close-btn" onclick="history.back()">✕</button>
    </div>

    <div class="coins-hud">🪙 <span id="coins">5000</span></div>

    <div class="tabs" id="shopTabs">
      <div class="tab active" data-cat="0">🌾 Fattoria</div>
      <div class="tab" data-cat="1">🍳 Cucina</div>
      <div class="tab" data-cat="2">🪑 Arredo</div>
      <div class="tab" data-cat="3">💎 Premium</div>
    </div>

    <div class="panel panel--wood panel--fancy">
      <div class="grid-3 shop-grid" id="shopGrid"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <nav class="tab-bar">
    <a class="tab-link" href="../gallery.html"><span class="tab-icon">🎮</span>Galleria</a>
    <a class="tab-link" href="hub.html"><span class="tab-icon">🏠</span>Hub</a>
    <a class="tab-link active" href="shop.html"><span class="tab-icon">🛒</span>Negozio</a>
    <a class="tab-link" href="map.html"><span class="tab-icon">🗺️</span>Mappa</a>
    <a class="tab-link" href="../index.html"><span class="tab-icon">🐰</span>Pet</a>
  </nav>
</main>

<script>
(function(){
  const catalog=[
    {cat:0,items:[
      {emoji:'🌽',name:'Mais',price:80},{emoji:'🥕',name:'Carote',price:60},{emoji:'🍅',name:'Pomodori',price:90},
      {emoji:'🌶️',name:'Peperoncini',price:120},{emoji:'🧅',name:'Cipolle',price:50},{emoji:'🥬',name:'Lattuga',price:45},
      {emoji:'🍆',name:'Melanzane',price:75},{emoji:'🥑',name:'Avocado',price:200,lock:30},{emoji:'🫐',name:'Mirtilli',price:180,lock:35}
    ]},
    {cat:1,items:[
      {emoji:'🍳',name:'Padella',price:300},{emoji:'🔪',name:'Coltello',price:250},{emoji:'🥄',name:'Mestolo',price:100},
      {emoji:'🫕',name:'Pentola',price:400},{emoji:'🧊',name:'Frigo',price:800},{emoji:'⏲️',name:'Timer Pro',price:500,lock:25}
    ]},
    {cat:2,items:[
      {emoji:'🪑',name:'Sedia',price:150},{emoji:'🛋️',name:'Divano',price:600},{emoji:'🪴',name:'Pianta',price:80},
      {emoji:'🖼️',name:'Quadro',price:200},{emoji:'🕯️',name:'Candela',price:60},{emoji:'🧸',name:'Peluche',price:350,lock:28}
    ]},
    {cat:3,items:[
      {emoji:'👑',name:'Corona VIP',price:2000},{emoji:'✨',name:'Aura Magica',price:1500},{emoji:'🌈',name:'Arcobaleno',price:3000},
      {emoji:'💎',name:'Diamante',price:5000,lock:40}
    ]}
  ];

  let coins=5000,currentCat=0,currentPage=0,bought=new Set();
  const PER_PAGE=9;
  const $=s=>document.querySelector(s);
  const toast=m=>{const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)};

  function render(){
    const items=catalog[currentCat].items;
    const pages=Math.ceil(items.length/PER_PAGE);
    currentPage=Math.min(currentPage,pages-1);
    const start=currentPage*PER_PAGE;
    const pageItems=items.slice(start,start+PER_PAGE);

    $('#shopGrid').innerHTML=pageItems.map((it,i)=>{
      const idx=start+i;
      const key=currentCat+'-'+idx;
      const locked=it.lock&&it.lock>24;
      const isBought=bought.has(key);
      return `<div class="item-card${locked?' locked':''}${isBought?' bought':''}" data-key="${key}" data-idx="${idx}">
        <div class="thumb"${locked?' data-lock="Sblocca a Lv.'+it.lock+'"':''}>${it.emoji}</div>
        <button class="price-btn" ${locked||isBought?'disabled style="opacity:.5"':''}>${locked?'🔒 Lv.'+it.lock:isBought?'✅ Comprato':'🪙 '+it.price}</button>
      </div>`;
    }).join('');

    $('#pagination').innerHTML=Array.from({length:pages},(_,i)=>
      `<div class="dot${i===currentPage?' active':''}" data-page="${i}"></div>`
    ).join('');

    $('#coins').textContent=coins.toLocaleString('it-IT');

    // Buy handlers
    document.querySelectorAll('.item-card:not(.locked):not(.bought)').forEach(card=>{
      card.addEventListener('click',()=>{
        const idx=+card.dataset.idx;
        const it=catalog[currentCat].items[idx];
        if(coins<it.price){toast('🪙 Monete insufficienti!');return}
        coins-=it.price;
        bought.add(card.dataset.key);
        toast('🛒 '+it.name+' acquistato!');
        render();
      });
    });

    // Pagination handlers
    document.querySelectorAll('.dot').forEach(d=>d.addEventListener('click',()=>{
      currentPage=+d.dataset.page;render();
    }));
  }

  // Tab switching
  document.querySelectorAll('#shopTabs .tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('#shopTabs .tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      currentCat=+tab.dataset.cat;currentPage=0;render();
    });
  });

  render();
})();
</script>
</body>
</html>
