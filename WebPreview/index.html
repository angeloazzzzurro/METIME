<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>METIME</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      font-family: "Avenir Next", "SF Pro Rounded", "Trebuchet MS", sans-serif;
      background: linear-gradient(160deg, #f8c0e0 0%, #e8c8f8 50%, #c8c0f8 100%);
      display: flex; justify-content: center; align-items: flex-start; padding: 14px 0 32px;
    }
    .phone {
      width: min(390px, 96vw); min-height: calc(100dvh - 28px);
      background: radial-gradient(ellipse 110% 55% at 50% 0%, #fcc8e0 0%, #f4c8f4 40%, #d4c0ff 80%, #c4b8f8 100%);
      border-radius: 52px; border: 2px solid rgba(255,255,255,0.5);
      box-shadow: 0 32px 72px rgba(140,80,180,0.28), inset 0 2px 0 rgba(255,255,255,0.85);
      overflow: hidden; display: flex; flex-direction: column; position: relative;
    }
    .notch { width: 36%; height: 28px; background: #1a0f2e; border-radius: 0 0 18px 18px; margin: 0 auto; flex-shrink: 0; }

    /* NAV BAR */
    .nav-bar { flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; padding: 8px 16px 6px; z-index: 10; }
    .nav-top {
      display: flex; gap: 10px; background: white; border-radius: 20px;
      padding: 8px 14px; box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      overflow-x: auto; scrollbar-width: none;
    }
    .nav-top::-webkit-scrollbar { display: none; }
    .nav-btn {
      display: flex; align-items: center; gap: 7px; padding: 6px 14px;
      border-radius: 14px; border: none; cursor: pointer; font-family: inherit;
      font-size: 14px; font-weight: 700; white-space: nowrap;
      transition: transform 0.12s;
    }
    .nav-btn:active { transform: scale(0.95); }
    .nav-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .nav-btn.store  { background: rgba(248,113,113,0.12); color: #ef4444; }
    .nav-btn.store  .nav-icon { background: #ef4444; }
    .nav-btn.zaino  { background: rgba(96,165,250,0.12);  color: #3b82f6; }
    .nav-btn.zaino  .nav-icon { background: #3b82f6; }
    .nav-btn.decora { background: rgba(167,139,250,0.12); color: #8b5cf6; }
    .nav-btn.decora .nav-icon { background: #8b5cf6; }
    .nav-tabs { display: flex; background: white; border-radius: 16px; box-shadow: 0 3px 10px rgba(0,0,0,0.06); overflow: hidden; margin: 0 20px; }
    .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0; border: none; background: transparent; cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 700; color: rgba(120,120,140,0.7); transition: color 0.15s; }
    .nav-tab .tab-icon { font-size: 18px; }
    .nav-tab.active { color: #8b5cf6; }

    /* SECTIONS */
    .section { display: none; flex: 1; flex-direction: column; }
    .section.active { display: flex; }

    /* Garden */
    .garden-wrap { flex: 1; display: flex; justify-content: center; padding: 4px 0 0; }
    .world-svg { width: 100%; max-width: 360px; overflow: visible; }
    @keyframes petBounce { 0%,100%{transform:translateY(0)} 45%{transform:translateY(-8px)} }
    .pet-group { animation: petBounce 2.2s ease-in-out infinite; }
    .picker-section { padding: 4px 14px 0; }
    .picker-label { font-size: 11px; color: rgba(80,40,120,0.7); font-weight: 600; text-align: center; margin-bottom: 6px; }
    .picker-row { display: flex; gap: 8px; justify-content: center; }
    .color-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(200,180,255,0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #8b5cf6; transition: transform 0.12s; }
    .color-dot:active { transform: scale(0.9); }
    .color-dot.selected { border: 2.5px solid #8b5cf6; }
    .pill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 14px 20px; }
    .pill-btn { border-radius: 999px; padding: 15px 20px; font-size: 16px; font-weight: 800; color: white; text-align: center; cursor: pointer; border: none; box-shadow: 0 4px 14px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.3); font-family: inherit; transition: transform 0.12s; }
    .pill-btn:active { transform: scale(0.96); }
    .pill-hunger { background: linear-gradient(135deg,#a78bfa,#7c3aed); }
    .pill-happy  { background: linear-gradient(135deg,#f87171,#ef4444); }
    .pill-calm   { background: linear-gradient(135deg,#93c5fd,#60a5fa); }
    .pill-energy { background: linear-gradient(135deg,#34d399,#10b981); }

    /* Placeholder */
    .placeholder { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
    .placeholder .p-emoji { font-size:64px; }
    .placeholder .p-title { font-size:24px; font-weight:900; color:rgba(60,30,100,0.65); }

    /* Toast */
    .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(30,15,60,0.85); color:#fff; border-radius:999px; padding:8px 18px; font-size:12px; font-weight:700; pointer-events:none; opacity:0; transition:opacity 0.25s; white-space:nowrap; z-index:99; }
    .toast.show { opacity:1; }
  </style>
</head>
<body>

  <!-- ZAINO -->

<div class="toast" id="toast"></div>

<script>
  function goTab(tab) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    showSection(tab === 'garden' ? 'section-garden' : 'section-home');
  }
  function goSection(name) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    showSection('section-' + name);
  }
  function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    const el = document.getElementById(id);
    if (el) el.classList.add('active');
  }
  function boost(stat, amount) { showToast('+' + amount + ' ' + stat + '! ✨'); }
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 1800);
  }
  function selectColor(el) {
    document.querySelectorAll('.color-dot').forEach(d => { d.classList.remove('selected'); d.textContent = ''; });
    el.classList.add('selected'); el.textContent = '✓';
  }
</script>
