<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>METIME – Rituale di Cura</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      font-family: "Avenir Next", "SF Pro Rounded", "Trebuchet MS", sans-serif;
      background: #f0c898;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 14px 0 32px;
    }

    .phone {
      width: min(390px, 96vw);
      min-height: calc(100dvh - 28px);
      background: linear-gradient(180deg, #fff8f0 0%, #fdecd8 40%, #fad8b8 100%);
      border-radius: 52px;
      border: 2px solid rgba(255,255,255,0.5);
      box-shadow: 0 32px 72px rgba(180,100,40,0.28), inset 0 2px 0 rgba(255,255,255,0.85);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .notch {
      width: 36%; height: 28px;
      background: #1a0f2e;
      border-radius: 0 0 18px 18px;
      margin: 0 auto;
      flex-shrink: 0;
    }

    /* Top nav */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px 0;
    }
    .top-nav .nav-left {
      font-size: 12px;
      font-family: "Courier New", monospace;
      color: #5a3a10;
      font-weight: 600;
    }
    .top-nav .nav-center {
      font-size: 15px;
      font-weight: 600;
      color: #3a2010;
    }
    .top-nav .nav-right {
      font-size: 12px;
      color: #5a3a10;
    }

    /* Content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 20px 0;
    }

    h1 {
      font-size: 28px;
      font-weight: 900;
      color: #1a0a00;
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #8a5030;
      text-align: center;
      max-width: 260px;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    /* Timer circle */
    .circle-wrap {
      margin-bottom: 28px;
    }
    .circle {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffe8c0, #f5c060 50%, #e0a030);
      box-shadow: 0 0 0 12px rgba(245,192,96,0.2), 0 8px 32px rgba(200,130,30,0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: breathe 4s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.03); box-shadow: 0 0 0 16px rgba(245,192,96,0.25), 0 12px 40px rgba(200,130,30,0.35); }
    }
    .phase-label {
      font-size: 16px;
      font-weight: 600;
      color: #5a3010;
      margin-bottom: 4px;
    }
    .timer-display {
      font-size: 44px;
      font-weight: 900;
      color: #2a1500;
      letter-spacing: -0.02em;
    }

    /* Stats card */
    .stats-card {
      background: white;
      border-radius: 20px;
      padding: 18px 22px;
      width: 100%;
      max-width: 300px;
      box-shadow: 0 4px 20px rgba(180,100,30,0.12);
      margin-bottom: 28px;
      display: grid;
      gap: 14px;
    }
    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f5f0e8;
      padding-bottom: 14px;
    }
    .stats-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .row-key {
      color: #888;
      font-size: 14px;
    }
    .row-val {
      color: #f97316;
      font-size: 14px;
      font-weight: 700;
    }

    /* End button */
    .btn-end {
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 16px 40px;
      font-size: 16px;
      font-weight: 800;
      width: calc(100% - 40px);
      max-width: 300px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      font-family: inherit;
      margin: 0 20px 28px;
      transition: transform 0.12s;
    }
    .btn-end:active { transform: scale(0.97); }
  </style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>

  <div class="top-nav">
    <span class="nav-left">9:41</span>
    <span class="nav-center">Care</span>
    <span class="nav-right">📶 🔋</span>
  </div>

  <div class="content">
    <h1>Rituale di Cura</h1>
    <p class="subtitle">Rituale di Cura — 4 minuti di respiro guidato per calmare il tuo pet</p>

    <div class="circle-wrap">
      <div class="circle">
        <span class="phase-label" id="phase">Inspira</span>
        <span class="timer-display" id="timer">03:12</span>
      </div>
    </div>

    <div class="stats-card">
      <div class="stats-row">
        <span class="row-key">Frequenza</span>
        <span class="row-val">6 respiri/min</span>
      </div>
      <div class="stats-row">
        <span class="row-key">Mood previsto</span>
        <span class="row-val">Calmo +18%</span>
      </div>
      <div class="stats-row">
        <span class="row-key">Ricompensa</span>
        <span class="row-val">+2 Semi Sereni</span>
      </div>
    </div>
  </div>

  <button class="btn-end" onclick="concludi()">Concludi Sessione</button>
</div>

<script>
  let sec = 192;
  const phases = ["Inspira", "Tieni", "Espira", "Pausa"];
  let pi = 0;

  const timerEl = document.getElementById('timer');
  const phaseEl = document.getElementById('phase');

  setInterval(() => {
    if (sec > 0) sec--;
    else { alert('Sessione completata! +2 Semi Sereni 🌱'); sec = 0; }
    timerEl.textContent =
      String(Math.floor(sec / 60)).padStart(2, '0') + ':' +
      String(sec % 60).padStart(2, '0');
  }, 1000);

  setInterval(() => {
    phaseEl.textContent = phases[pi++ % phases.length];
  }, 4000);

  function concludi() {
    alert('Sessione completata! +2 Semi Sereni 🌱');
  }
</script>
</body>
</html>
