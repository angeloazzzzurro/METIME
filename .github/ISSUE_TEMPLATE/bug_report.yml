name: Bug report
description: Report a product bug or regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can someone reproduce it?
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Area
      description: App, Store, House, Garden, WebPreview, CI, Docs, etc.
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Logs, screenshots, hypotheses, device info.
