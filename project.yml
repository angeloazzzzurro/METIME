name: METIME
options:
  bundleIdPrefix: com.metime
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""

targets:

  # ── Main App ──────────────────────────────────────────────────────────────
  METIME:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    bundleId: com.metime.app
    sources:
      - path: App        # METIMEApp.swift, AppState.swift, Resources.swift
      - path: Audio
      - path: Creature
      - path: Garden
      - path: Data
      - path: UI
      - path: Resources
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metime.app
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: METIME.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # ── Unit Tests ────────────────────────────────────────────────────────────
  METIMETests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    bundleId: com.metime.app.tests
    sources:
      - path: Tests/METIMETests
    dependencies:
      - target: METIME
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metime.app.tests

  # ── UI Tests ──────────────────────────────────────────────────────────────
  METIMEUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    bundleId: com.metime.app.uitests
    sources:
      - path: Tests/METIMEUITests
    dependencies:
      - target: METIME
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metime.app.uitests
        TEST_TARGET_NAME: METIME
