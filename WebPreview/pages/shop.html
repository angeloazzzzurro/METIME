<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>METIME — Negozio</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/game.css"/>
  <style>
    .shop-grid{gap:8px}
    .pagination{display:flex;justify-content:center;gap:6px;margin-top:14px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--border-lt);opacity:.4;cursor:pointer;transition:opacity .2s,background .2s,transform .15s var(--spring)}
    .dot.active{opacity:1;background:var(--orange);transform:scale(1.25)}
    .coins-hud{text-align:right;font-size:15px;font-weight:900;color:var(--ink);margin-bottom:8px;font-variant-numeric:tabular-nums;transition:transform .2s var(--spring)}
    .coins-hud.bump{animation:coinBump .45s var(--spring)}
    @keyframes coinBump{0%{transform:scale(1)}35%{transform:scale(1.2) translateY(-2px)}100%{transform:scale(1)}}
    .item-card.bought .thumb::after{content:'✅';position:absolute;inset:0;display:grid;place-items:center;font-size:28px;background:rgba(255,255,255,.65);border-radius:inherit;backdrop-filter:blur(2px)}
    .item-card .thumb{position:relative}
    .item-card .owned-badge{
      position:absolute;top:4px;right:4px;
      background:var(--sage);color:#fff;font-size:8px;font-weight:900;
      padding:2px 6px;border-radius:999px;
      box-shadow:0 1px 3px rgba(0,0,0,.15);
    }
    .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.6);background:linear-gradient(180deg,rgba(253,243,227,.98),rgba(245,234,216,.98));border:3px solid var(--border);border-radius:var(--radius-lg);padding:18px 30px;text-align:center;box-shadow:0 12px 48px rgba(61,43,31,.35),var(--inner-glow);z-index:200;opacity:0;pointer-events:none;transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .2s;backdrop-filter:blur(12px);font-size:13px;font-weight:800;color:var(--ink)}
    .toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
    .casa-banner{
      display:flex;align-items:center;gap:8px;padding:10px 14px;
      border-radius:var(--radius);margin-top:10px;
      background:linear-gradient(135deg,rgba(143,168,130,.12),rgba(143,168,130,.06));
      border:2px solid rgba(143,168,130,.25);
      color:var(--ink);font-size:12px;font-weight:800;text-decoration:none;
      transition:transform .15s var(--spring),background .15s;
    }
    .casa-banner:hover{transform:translateY(-2px);background:rgba(143,168,130,.18)}
    .casa-banner .cb-arrow{margin-left:auto;font-size:14px}
  </style>
</head>
<body>
<div class="toast" id="toast"></div>
<main class="phone">
  <div class="screen">

    <div class="page-hdr">
      <h1 class="page-title">Negozio</h1>
      <button class="close-btn" onclick="history.back()">✕</button>
    </div>

    <div class="coins-hud">🪙 <span id="coins">5000</span></div>

    <div class="tabs" id="shopTabs">
      <div class="tab active" data-cat="0">🏠 Casa</div>
      <div class="tab" data-cat="1">🌾 Fattoria</div>
      <div class="tab" data-cat="2">🍳 Cucina</div>
      <div class="tab" data-cat="3">💎 Premium</div>
    </div>

    <div class="panel panel--wood panel--fancy">
      <div class="grid-3 shop-grid" id="shopGrid"></div>
      <div class="pagination" id="pagination"></div>
    </div>

    <a class="casa-banner" href="hub.html" id="casaBanner" style="display:none">
      🏠 Vai alla tua Casa per posizionare i mobili!
      <span class="cb-arrow">→</span>
    </a>
  </div>

  <nav class="tab-bar">
    <a class="tab-link" href="../gallery.html"><span class="tab-icon">🎮</span>Galleria</a>
    <a class="tab-link" href="hub.html"><span class="tab-icon">🏠</span>Casa</a>
    <a class="tab-link active" href="shop.html"><span class="tab-icon">🛒</span>Negozio</a>
    <a class="tab-link" href="map.html"><span class="tab-icon">🗺️</span>Mappa</a>
    <a class="tab-link" href="../index.html"><span class="tab-icon">🐰</span>Pet</a>
  </nav>
</main>

<script>
(function(){
  /* ── Furniture ids (must match hub.html FURN keys) ── */
  const HOUSE_ITEMS=[
    {id:'chair',emoji:'🪑',name:'Sedia',price:150},
    {id:'sofa',emoji:'🛋️',name:'Divano',price:600},
    {id:'plant',emoji:'🪴',name:'Pianta',price:80},
    {id:'painting',emoji:'🖼️',name:'Quadro',price:200},
    {id:'candle',emoji:'🕯️',name:'Candela',price:60},
    {id:'plushie',emoji:'🧸',name:'Peluche',price:350},
    {id:'bed',emoji:'🛏️',name:'Letto',price:500},
    {id:'lamp',emoji:'🪔',name:'Lampada',price:120},
    {id:'tv',emoji:'📺',name:'TV',price:800},
    {id:'bookshelf',emoji:'📚',name:'Libreria',price:280},
    {id:'clock',emoji:'🕰️',name:'Orologio',price:180},
    {id:'xtable',emoji:'🪵',name:'Tavolino',price:200},
    {id:'mirror',emoji:'🪞',name:'Specchio',price:250},
    {id:'rug',emoji:'🟤',name:'Tappeto',price:100},
    {id:'stove',emoji:'🍳',name:'Fornello',price:400},
    {id:'fridge',emoji:'🧊',name:'Frigo',price:700}
  ];

  const catalog=[
    {cat:0, house:true, items:HOUSE_ITEMS},
    {cat:1, items:[
      {emoji:'🌽',name:'Mais',price:80},{emoji:'🥕',name:'Carote',price:60},{emoji:'🍅',name:'Pomodori',price:90},
      {emoji:'🌶️',name:'Peperoncini',price:120},{emoji:'🧅',name:'Cipolle',price:50},{emoji:'🥬',name:'Lattuga',price:45},
      {emoji:'🍆',name:'Melanzane',price:75},{emoji:'🥑',name:'Avocado',price:200,lock:30},{emoji:'🫐',name:'Mirtilli',price:180,lock:35}
    ]},
    {cat:2, items:[
      {emoji:'🍳',name:'Padella',price:300},{emoji:'🔪',name:'Coltello',price:250},{emoji:'🥄',name:'Mestolo',price:100},
      {emoji:'🫕',name:'Pentola',price:400},{emoji:'⏲️',name:'Timer Pro',price:500,lock:25}
    ]},
    {cat:3, items:[
      {emoji:'👑',name:'Corona VIP',price:2000},{emoji:'✨',name:'Aura Magica',price:1500},{emoji:'🌈',name:'Arcobaleno',price:3000},
      {emoji:'💎',name:'Diamante',price:5000,lock:40}
    ]}
  ];

  function load(k,fb){try{return JSON.parse(localStorage.getItem(k))}catch(e){}return fb}
  let coins=load('metime_coins',5000);
  let homeInv=load('metime_inv',[]);       // furniture in house inventory
  let bought=new Set(load('metime_bought',[])); // one-time buys (non-house)
  let currentCat=0,currentPage=0;
  const PER_PAGE=9;

  const $=s=>document.querySelector(s);
  function saveCoins(){localStorage.setItem('metime_coins',JSON.stringify(coins))}
  function saveInv(){localStorage.setItem('metime_inv',JSON.stringify(homeInv))}
  function saveBought(){localStorage.setItem('metime_bought',JSON.stringify([...bought]))}
  function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}

  /* Count how many of an id are in homeInv + placed + wall */
  function ownedCount(id){
    let n=homeInv.filter(x=>x===id).length;
    const fl=load('metime_floor',{});Object.values(fl).forEach(v=>{if(v===id)n++});
    const wl=load('metime_wall',[]);wl.forEach(v=>{if(v===id)n++});
    return n;
  }

  function bumpCoins(){
    const hud=document.querySelector('.coins-hud');
    hud.classList.remove('bump');void hud.offsetWidth;hud.classList.add('bump');
  }

  function render(){
    const cat=catalog[currentCat];
    const items=cat.items;
    const isHouse=!!cat.house;
    const pages=Math.ceil(items.length/PER_PAGE);
    currentPage=Math.min(currentPage,pages-1);
    const start=currentPage*PER_PAGE;
    const pageItems=items.slice(start,start+PER_PAGE);

    $('#shopGrid').innerHTML=pageItems.map((it,i)=>{
      const idx=start+i;
      const key=currentCat+'-'+idx;
      const locked=it.lock&&it.lock>24;

      if(isHouse){
        // House items — repeatable buy, show owned count
        const owned=ownedCount(it.id);
        return '<div class="item-card'+(locked?' locked':'')+'" data-key="'+key+'" data-idx="'+idx+'">'
          +'<div class="thumb"'+(locked?' data-lock="Sblocca a Lv.'+it.lock+'"':'')+'>'+it.emoji
          +(owned>0?'<span class="owned-badge">×'+owned+'</span>':'')
          +'</div>'
          +'<button class="price-btn" '+(locked?'disabled style="opacity:.5"':'')+'>'
          +(locked?'🔒 Lv.'+it.lock:'🪙 '+it.price)
          +'</button></div>';
      }else{
        // One-time buyable
        const isBought=bought.has(key);
        return '<div class="item-card'+(locked?' locked':'')+(isBought?' bought':'')+'" data-key="'+key+'" data-idx="'+idx+'">'
          +'<div class="thumb"'+(locked?' data-lock="Sblocca a Lv.'+it.lock+'"':'')+'>'+it.emoji+'</div>'
          +'<button class="price-btn" '+(locked||isBought?'disabled style="opacity:.5"':'')+'>'
          +(locked?'🔒 Lv.'+it.lock:isBought?'✅ Comprato':'🪙 '+it.price)
          +'</button></div>';
      }
    }).join('');

    $('#pagination').innerHTML=Array.from({length:pages},(_,i)=>
      '<div class="dot'+(i===currentPage?' active':'')+'" data-page="'+i+'"></div>'
    ).join('');

    $('#coins').textContent=coins.toLocaleString('it-IT');

    // Show casa banner when viewing house tab
    $('#casaBanner').style.display=isHouse?'flex':'none';

    // Buy handlers
    document.querySelectorAll('.item-card:not(.locked):not(.bought)').forEach(card=>{
      card.addEventListener('click',()=>{
        const idx=+card.dataset.idx;
        const cat2=catalog[currentCat];
        const it=cat2.items[idx];
        if(coins<it.price){toast('🪙 Monete insufficienti!');return}
        coins-=it.price;
        bumpCoins();
        if(cat2.house){
          // Add to house inventory
          homeInv.push(it.id);
          saveInv();saveCoins();
          toast('🏠 '+it.name+' acquistato! Vai alla Casa per posizionarlo');
        }else{
          bought.add(card.dataset.key);
          saveBought();saveCoins();
          toast('🛒 '+it.name+' acquistato!');
        }
        render();
      });
    });

    document.querySelectorAll('.dot').forEach(d=>d.addEventListener('click',()=>{
      currentPage=+d.dataset.page;render();
    }));
  }

  document.querySelectorAll('#shopTabs .tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('#shopTabs .tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      currentCat=+tab.dataset.cat;currentPage=0;render();
    });
  });

  render();
})();
</script>
</body>
</html>
