<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="METIME pet evolution">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6edff"/>
      <stop offset="100%" stop-color="#e5f7ff"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#505b90" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <text x="600" y="120" text-anchor="middle" font-family="Avenir Next, Arial, sans-serif" font-size="56" font-weight="900" fill="#2b3156">Evoluzione del Pet</text>
  <text x="600" y="164" text-anchor="middle" font-family="Avenir Next, Arial, sans-serif" font-size="24" font-weight="700" fill="#5c6795">La crescita come specchio della costanza quotidiana</text>

  <g font-family="Avenir Next, Arial, sans-serif" text-anchor="middle" filter="url(#cardShadow)">
    <g transform="translate(130 260)">
      <rect width="180" height="250" rx="24" fill="#ffffff"/>
      <text x="90" y="130" font-size="78">🥚</text>
      <text x="90" y="195" font-size="24" font-weight="800" fill="#3f4a7a">Uovo</text>
    </g>

    <g transform="translate(350 260)">
      <rect width="180" height="250" rx="24" fill="#ffffff"/>
      <text x="90" y="130" font-size="78">🌱</text>
      <text x="90" y="195" font-size="24" font-weight="800" fill="#3f4a7a">Germoglio</text>
    </g>

    <g transform="translate(570 260)">
      <rect width="180" height="250" rx="24" fill="#ffffff"/>
      <text x="90" y="130" font-size="78">🌸</text>
      <text x="90" y="195" font-size="24" font-weight="800" fill="#3f4a7a">Fioritura</text>
    </g>

    <g transform="translate(790 260)">
      <rect width="180" height="250" rx="24" fill="#ffffff"/>
      <text x="90" y="130" font-size="78">✨</text>
      <text x="90" y="195" font-size="24" font-weight="800" fill="#3f4a7a">Spirito</text>
    </g>

    <g transform="translate(1010 260)">
      <rect width="180" height="250" rx="24" fill="#ffffff"/>
      <text x="90" y="130" font-size="78">👑</text>
      <text x="90" y="195" font-size="24" font-weight="800" fill="#3f4a7a">Leggenda</text>
    </g>
  </g>

  <g stroke="#6f79aa" stroke-width="4" fill="none" opacity="0.65">
    <line x1="310" y1="385" x2="350" y2="385"/>
    <line x1="530" y1="385" x2="570" y2="385"/>
    <line x1="750" y1="385" x2="790" y2="385"/>
    <line x1="970" y1="385" x2="1010" y2="385"/>
  </g>
</svg>
